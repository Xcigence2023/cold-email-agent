<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Velorah - History</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070c18;--bg2:#0d1526;--bg3:#111e35;--text:#e8f0fe;--text2:#7b91b4;--text3:#4a5f80;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--purple:#8b5cf6;--border:rgba(59,130,246,.15);--border2:rgba(59,130,246,.3);--glass:rgba(255,255,255,.03);--r:10px;--rl:14px}
body{font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(59,130,246,.08),transparent 60%),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(6,182,212,.06),transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(7,12,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:14px}
.brand-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,#e8f0fe,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:2px;margin-left:10px}
.nav a{font-size:12px;font-weight:500;padding:5px 10px;border-radius:8px;text-decoration:none;color:var(--text2);transition:all .2s}
.nav a:hover{color:var(--text);background:rgba(59,130,246,.08)}
.nav a.active{color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:1.5rem}
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:linear-gradient(var(--blue),var(--cyan));border-radius:2px}
.lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
input,select{width:100%;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);background:rgba(13,21,38,.8);color:var(--text);font-family:'Outfit',sans-serif;transition:all .2s}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
input::placeholder{color:var(--text3)}
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s}
.btn:hover{border-color:var(--border2)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--blue),#2563eb);border-color:var(--blue);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-ai{background:linear-gradient(135deg,var(--purple),var(--blue));border:none;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:2px;transition:width .4s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:rgba(13,21,38,.5);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(59,130,246,.04)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Outfit',sans-serif}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.empty{text-align:center;padding:3rem;color:var(--text2)}
</style>
</head>
<body>
<div class="topbar">
  <div class="flex" style="gap:0">
    <div class="brand"><div class="brand-logo">V</div><span class="brand-name">Velorah</span></div>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/app.html">Campaigns</a>
      <a href="/campaign-video.html">Ares</a>
      <a href="/linkedin.html">LinkedIn</a>
      <a href="/find-leads.html">Koios Intel</a>
      <a href="/social-listen.html">Athena One</a>
      <a href="/visitors.html">Argus Watch</a>
      <a href="/history.html" class="active">History</a>
    </nav>
  </div>
  <div class="flex">
    <span id="user-email" style="font-size:12px;color:var(--text2)"></span>
    <button class="btn btn-sm btn-ai" onclick="runAIPrediction()" id="ai-btn">AI Predict Interest</button>
    <button class="btn btn-sm" onclick="refreshTracking()" id="refresh-btn">Refresh Tracking</button>
    <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-sm" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="page">
  <div class="fb" style="margin-bottom:1rem">
    <div>
      <h1 style="font-size:20px;font-weight:800;margin-bottom:4px">Email Analytics</h1>
      <p id="last-updated" style="font-size:12px;color:var(--text2)">Loading...</p>
    </div>
    <div class="flex">
      <input type="text" id="search-inp" placeholder="Search name, email, company..." style="width:220px" oninput="applyFilters()"/>
      <select id="status-filter" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="opened">Opened</option>
        <option value="clicked">Clicked</option>
        <option value="delivered">Delivered</option>
        <option value="bounced">Bounced</option>
        <option value="pending">Pending</option>
      </select>
      <select id="campaign-filter" onchange="applyFilters()">
        <option value="">All Campaigns</option>
      </select>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat"><div class="stat-val" id="s-total" style="color:var(--blue)">-</div><div class="stat-lbl">Sent</div></div>
    <div class="stat"><div class="stat-val" id="s-opened" style="color:var(--green)">-</div><div class="stat-lbl">Opened</div><div class="pbar"><div class="pfill" id="s-open-bar" style="background:var(--green);width:0%"></div></div><div id="s-open-pct" style="font-size:10px;color:var(--text2);margin-top:2px">0%</div></div>
    <div class="stat"><div class="stat-val" id="s-clicked" style="color:var(--blue)">-</div><div class="stat-lbl">Clicked</div><div class="pbar"><div class="pfill" id="s-click-bar" style="background:var(--blue);width:0%"></div></div><div id="s-click-pct" style="font-size:10px;color:var(--text2);margin-top:2px">0%</div></div>
    <div class="stat"><div class="stat-val" id="s-delivered" style="color:var(--gold)">-</div><div class="stat-lbl">Delivered</div></div>
    <div class="stat"><div class="stat-val" id="s-bounced" style="color:var(--red)">-</div><div class="stat-lbl">Bounced</div></div>
    <div class="stat"><div class="stat-val" id="s-unsub" style="color:var(--purple)">-</div><div class="stat-lbl">Unsubscribed</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all',this)">All Emails</button>
    <button class="tab-btn" onclick="switchTab('hot',this)">Hot Leads</button>
    <button class="tab-btn" onclick="switchTab('opened',this)">Opened</button>
    <button class="tab-btn" onclick="switchTab('clicked',this)">Clicked</button>
    <button class="tab-btn" onclick="switchTab('pending',this)">Not Opened</button>
  </div>

  <div id="main-content"><div class="card"><div class="empty"><div class="spin"></div><p style="margin-top:12px">Loading email history...</p></div></div></div>
  <div class="fb" id="pagination" style="display:none;margin-top:12px">
    <span id="page-info" style="font-size:13px;color:var(--text2)"></span>
    <div class="flex">
      <button class="btn btn-sm" id="prev-btn" onclick="changePage(-1)">Prev</button>
      <button class="btn btn-sm" id="next-btn" onclick="changePage(1)">Next</button>
    </div>
  </div>
</div>

<script>
var SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
var sbClient=window.supabase.createClient(SB_URL,SB_KEY);
var _session=null;
var allRecords=[];
var filtered=[];
var predictions={};
var currentTab='all';
var currentPage=1;
var PAGE=50;

async function init(){
  var r=await sbClient.auth.getSession();
  if(!r.data.session){window.location.href='/login.html';return;}
  _session=r.data.session;
  document.getElementById('user-email').textContent=r.data.session.user.email;
  await loadHistory();
}

async function loadHistory(){
  try{
    var resp=await fetch('/.netlify/functions/email_history?limit=1000',{headers:{'Authorization':'Bearer '+_session.access_token}});

    // Detect non-JSON / error responses BEFORE parsing (avoids 'Unexpected token <')
    if(!resp.ok){
      var detail='';
      try{var ej=await resp.json();detail=ej.error||'';}catch(e){detail='';}
      if(resp.status===404){
        throw new Error('The email history service is not deployed. Confirm netlify/functions/email_history.js exists in the repo and the last deploy succeeded.');
      }
      if(resp.status===401){
        throw new Error('Your session expired. Please sign in again.');
      }
      throw new Error('Service error '+resp.status+(detail?(': '+detail):''));
    }

    var ctype=resp.headers.get('content-type')||'';
    if(ctype.indexOf('application/json')<0){
      throw new Error('The history service returned an unexpected response (not JSON). The function may have crashed or is not deployed.');
    }

    var data=await resp.json();
    allRecords=data.records||[];
    document.getElementById('last-updated').textContent='Last updated: '+new Date().toLocaleString()+' | '+allRecords.length+' total';
    populateCampaignFilter();
    updateStats();
    applyFilters();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="card"><div class="empty" style="padding:2rem;text-align:center"><p style="font-weight:700;margin-bottom:6px">Could not load email analytics</p><p style="color:var(--text2);font-size:13px">'+e.message+'</p></div></div>';
  }
}

function populateCampaignFilter(){
  var campaigns=[];
  var seen={};
  allRecords.forEach(function(r){if(r.campaign_name&&!seen[r.campaign_name]){seen[r.campaign_name]=1;campaigns.push(r.campaign_name);}});
  var sel=document.getElementById('campaign-filter');
  sel.innerHTML='<option value="">All Campaigns</option>';
  campaigns.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}

function updateStats(){
  var total=allRecords.length;
  var opened=allRecords.filter(function(r){return r.tracking_status==='opened';}).length;
  var clicked=allRecords.filter(function(r){return r.tracking_status==='clicked';}).length;
  var delivered=allRecords.filter(function(r){return r.tracking_status==='delivered'||r.status==='sent';}).length;
  var bounced=allRecords.filter(function(r){return r.tracking_status==='bounced';}).length;
  var unsub=allRecords.filter(function(r){return r.tracking_status==='unsubscribed';}).length;
  var openPct=total>0?Math.round(opened/total*100):0;
  var clickPct=total>0?Math.round(clicked/total*100):0;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-opened').textContent=opened;
  document.getElementById('s-clicked').textContent=clicked;
  document.getElementById('s-delivered').textContent=delivered;
  document.getElementById('s-bounced').textContent=bounced;
  document.getElementById('s-unsub').textContent=unsub;
  document.getElementById('s-open-bar').style.width=openPct+'%';
  document.getElementById('s-click-bar').style.width=clickPct+'%';
  document.getElementById('s-open-pct').textContent=openPct+'% open rate';
  document.getElementById('s-click-pct').textContent=clickPct+'% click rate';
}

function applyFilters(){
  var search=document.getElementById('search-inp').value.toLowerCase();
  var status=document.getElementById('status-filter').value;
  var campaign=document.getElementById('campaign-filter').value;
  filtered=allRecords.filter(function(r){
    if(status&&r.tracking_status!==status)return false;
    if(campaign&&r.campaign_name!==campaign)return false;
    if(currentTab==='hot'&&(!predictions[r.id]||predictions[r.id].tier==='cold'))return false;
    if(currentTab==='opened'&&r.tracking_status!=='opened')return false;
    if(currentTab==='clicked'&&r.tracking_status!=='clicked')return false;
    if(currentTab==='pending'&&r.tracking_status!=='pending')return false;
    if(search){
      var str=((r.recipient_name||'')+(r.recipient_email||'')+(r.company||'')+(r.campaign_name||'')).toLowerCase();
      if(str.indexOf(search)<0)return false;
    }
    return true;
  });
  currentPage=1;
  renderContent();
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  applyFilters();
}

function changePage(dir){
  var total=Math.ceil(filtered.length/PAGE);
  currentPage=Math.max(1,Math.min(total,currentPage+dir));
  renderContent();
}

function fmtDate(d){
  if(!d)return'-';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function trackBadge(r){
  var t=r.tracking_status;
  if(t==='opened')   return '<span class="badge" style="background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)">Opened</span>';
  if(t==='clicked')  return '<span class="badge" style="background:rgba(59,130,246,.15);color:var(--blue);border:1px solid var(--border2)">Clicked</span>';
  if(t==='delivered')return '<span class="badge" style="background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.3)">Delivered</span>';
  if(t==='bounced')  return '<span class="badge" style="background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3)">Bounced</span>';
  if(t==='unsubscribed')return '<span class="badge" style="background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.3)">Unsubscribed</span>';
  return '<span class="badge" style="background:var(--bg3);color:var(--text3)">Pending</span>';
}

function aiScoreBadge(id){
  var p=predictions[id];
  if(!p)return'';
  if(p.tier==='hot')  return'<span class="badge" style="background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)">Hot '+p.score+'</span>';
  if(p.tier==='warm') return'<span class="badge" style="background:rgba(59,130,246,.15);color:var(--blue);border:1px solid var(--border2)">Warm '+p.score+'</span>';
  return'<span class="badge" style="background:var(--bg3);color:var(--text3)">Cold '+p.score+'</span>';
}

function renderContent(){
  var container=document.getElementById('main-content');
  if(!filtered.length){
    container.innerHTML='<div class="card"><div class="empty"><p>No emails found. Adjust filters or launch your first campaign.</p></div></div>';
    document.getElementById('pagination').style.display='none';
    return;
  }
  if(currentTab==='hot')renderHotLeads(container);
  else renderTable(container);
  var total=Math.ceil(filtered.length/PAGE);
  var pag=document.getElementById('pagination');
  if(total>1){
    pag.style.display='flex';
    var from=(currentPage-1)*PAGE+1;
    var to=Math.min(currentPage*PAGE,filtered.length);
    document.getElementById('page-info').textContent='Showing '+from+'-'+to+' of '+filtered.length;
    document.getElementById('prev-btn').disabled=currentPage<=1;
    document.getElementById('next-btn').disabled=currentPage>=total;
  }else pag.style.display='none';
}

function renderTable(container){
  var page=filtered.slice((currentPage-1)*PAGE,currentPage*PAGE);
  var html='<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Recipient</th><th>Campaign</th><th>Subject</th><th>Status</th><th>Sent</th><th>Opened</th><th>Clicked</th><th>AI Score</th></tr></thead><tbody>';
  page.forEach(function(r){
    var bg='';
    if(r.tracking_status==='opened')bg='background:rgba(16,185,129,.05)';
    else if(r.tracking_status==='clicked')bg='background:rgba(59,130,246,.05)';
    else if(r.tracking_status==='bounced')bg='background:rgba(239,68,68,.05)';
    html+='<tr style="'+bg+'">';
    html+='<td><div style="font-weight:700">'+(r.recipient_name||'-')+'</div>';
    html+='<div style="font-size:11px;color:var(--text2)">'+(r.recipient_email||'')+'</div>';
    html+='<div style="font-size:11px;color:var(--text2)">'+(r.company||'')+(r.title?' | '+r.title:'')+'</div></td>';
    html+='<td style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r.campaign_name||'-')+'</td>';
    html+='<td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r.subject||'-')+'</td>';
    html+='<td>'+trackBadge(r)+'</td>';
    html+='<td style="font-size:11px;white-space:nowrap">'+fmtDate(r.sent_at)+'</td>';
    html+='<td style="font-size:11px;white-space:nowrap;color:var(--green)">'+(r.opened_at?fmtDate(r.opened_at):'-')+'</td>';
    html+='<td style="font-size:11px;white-space:nowrap;color:var(--blue)">'+(r.clicked_at?fmtDate(r.clicked_at):'-')+'</td>';
    html+='<td>'+aiScoreBadge(r.id)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  container.innerHTML=html;
}

function renderHotLeads(container){
  var page=filtered.slice((currentPage-1)*PAGE,currentPage*PAGE);
  if(!page.length){
    container.innerHTML='<div class="card"><div class="empty"><p>No hot leads yet. Click "AI Predict Interest" to score your opened leads.</p></div></div>';
    return;
  }
  var sorted=page.slice().sort(function(a,b){var sa=predictions[a.id]?predictions[a.id].score:0;var sb=predictions[b.id]?predictions[b.id].score:0;return sb-sa;});
  var html='<div>';
  sorted.forEach(function(r){
    var p=predictions[r.id];
    var tier=p?p.tier:'cold';
    var bc=tier==='hot'?'rgba(245,158,11,.3)':tier==='warm'?'var(--border2)':'var(--border)';
    html+='<div style="background:var(--glass);border:1px solid var(--border);border-left:3px solid '+bc+';border-radius:var(--rl);padding:14px;margin-bottom:8px">';
    html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">';
    html+='<span style="font-weight:700;font-size:14px">'+(r.recipient_name||'Unknown')+'</span>';
    html+=aiScoreBadge(r.id)+trackBadge(r);
    html+='</div>';
    html+='<div style="font-size:12px;color:var(--text2);margin-bottom:4px">'+(r.title||'')+(r.company?' at <strong style="color:var(--text)">'+r.company+'</strong>':'')+'</div>';
    html+='<div style="font-size:12px;color:var(--text2)">'+( r.recipient_email||'-')+'</div>';
    if(p){html+='<div style="font-size:12px;background:var(--bg3);border-radius:var(--r);padding:8px 10px;margin-top:8px"><p><strong>Why:</strong> '+(p.reason||'')+'</p><p style="margin-top:4px"><strong>Next:</strong> <span style="color:var(--blue);font-weight:600">'+(p.action||'')+'</span></p></div>';}
    html+='</div>';
    html+='<div style="text-align:right;flex-shrink:0">';
    if(r.sent_at)html+='<p style="font-size:11px;color:var(--text2)">Sent: '+fmtDate(r.sent_at)+'</p>';
    if(r.opened_at)html+='<p style="font-size:11px;color:var(--green)">Opened: '+fmtDate(r.opened_at)+'</p>';
    if(r.recipient_email)html+='<a href="mailto:'+r.recipient_email+'" style="display:inline-block;margin-top:8px;padding:5px 12px;background:var(--blue);color:white;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none">Reply</a>';
    html+='</div></div></div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

async function runAIPrediction(){
  var engaged=allRecords.filter(function(r){return r.tracking_status==='opened'||r.tracking_status==='clicked';});
  if(!engaged.length){alert('No opened or clicked emails to analyse.');return;}
  var btn=document.getElementById('ai-btn');
  btn.disabled=true;btn.textContent='Analysing '+engaged.length+' leads...';
  try{
    var BATCH=20;
    for(var i=0;i<engaged.length;i+=BATCH){
      var batch=engaged.slice(i,i+BATCH);
      btn.textContent='Analysing '+(i+batch.length)+' of '+engaged.length+'...';
      var resp=await fetch('/.netlify/functions/analyze-leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({leads:batch.map(function(r){return{id:r.id,name:r.recipient_name||'Unknown',title:r.title||'',company:r.company||'',industry:r.industry||'',companySize:r.company_size||'',trackingStatus:r.tracking_status,clicked:r.tracking_status==='clicked',openCount:r.open_count||1,subject:r.subject||''};})})});
      var data=await resp.json();
      if(data.predictions){data.predictions.forEach(function(p,idx){var lead=batch[p.index!=null?p.index:idx];if(lead)predictions[lead.id]=p;});}
    }
    currentTab='hot';
    document.querySelectorAll('.tab-btn').forEach(function(t,i){t.classList.toggle('active',i===1);});
    applyFilters();
  }catch(e){alert('AI prediction failed: '+e.message);}
  btn.disabled=false;btn.textContent='AI Predict Interest';
}

async function refreshTracking(){
  var btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.textContent='Refreshing...';
  var toCheck=allRecords.filter(function(r){return !r.tracking_status||r.tracking_status==='pending'||r.tracking_status==='delivered';});
  if(!toCheck.length){btn.disabled=false;btn.textContent='Refresh Tracking';alert('All emails have tracking data.');return;}
  try{
    var resp=await fetch('/.netlify/functions/check-tracking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails:toCheck.map(function(r){return{email:r.recipient_email,messageId:r.message_id||''};})})});
    var data=await resp.json();
    if(data.results){Object.keys(data.results).forEach(function(email){var r=allRecords.find(function(x){return x.recipient_email===email;});if(r)r.tracking_status=data.results[email];});}
    updateStats();applyFilters();
    document.getElementById('last-updated').textContent='Refreshed: '+new Date().toLocaleString();
  }catch(e){alert('Refresh failed: '+e.message);}
  btn.disabled=false;btn.textContent='Refresh Tracking';
}

function exportCSV(){
  if(!filtered.length){alert('No data to export.');return;}
  var hdrs=['Campaign','Name','Email','Company','Title','Status','Tracking','Sent','Opened','Clicked','AI Score','AI Tier'];
  var rows=filtered.map(function(r){var p=predictions[r.id];return[r.campaign_name||'',r.recipient_name||'',r.recipient_email||'',r.company||'',r.title||'',r.status||'',r.tracking_status||'',r.sent_at?new Date(r.sent_at).toLocaleString():'',r.opened_at?new Date(r.opened_at).toLocaleString():'',r.clicked_at?new Date(r.clicked_at).toLocaleString():'',p?p.score:'',p?p.tier:''];});
  var csv=[hdrs].concat(rows).map(function(row){return row.map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='velorah_history_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

async function signOut(){await sbClient.auth.signOut();window.location.href='/login.html';}
init();

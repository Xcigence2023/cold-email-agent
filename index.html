<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xcigence — AI Cold Email Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ec;
  --text:#1a1a1a;--text2:#6b6b6b;
  --border:#e0e0d8;--border2:#c8c8c0;
  --info-bg:#eff6ff;--info-text:#1d4ed8;--info-border:#bfdbfe;
  --success-bg:#f0fdf4;--success-text:#15803d;--success-border:#bbf7d0;
  --danger-bg:#fff1f2;--danger-text:#be123c;--danger-border:#fecdd3;
  --warn-bg:#fffbeb;--warn-text:#b45309;--warn-border:#fde68a;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f5f5f0;--text2:#aeaeb2;
  --border:#3a3a3c;--border2:#48484a;
  --info-bg:#1e3a5f;--info-text:#93c5fd;--info-border:#1e40af;
  --success-bg:#14532d;--success-text:#86efac;--success-border:#166534;
  --danger-bg:#4c0519;--danger-text:#fca5a5;--danger-border:#9f1239;
  --warn-bg:#451a03;--warn-text:#fcd34d;--warn-border:#92400e;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.page{max-width:980px;margin:0 auto;padding:2rem 1.5rem}
.hdr{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:4px}
.hdr p{font-size:13px;color:var(--text2)}
.step-bar{display:flex;align-items:center;margin-bottom:1.5rem}
.si{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.si.active{color:var(--text);font-weight:600}
.si.done{color:var(--success-text)}
.sn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg);flex-shrink:0}
.si.active .sn{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text)}
.si.done .sn{background:var(--success-bg);border-color:var(--success-border);color:var(--success-text)}
.sdiv{flex:1;height:1px;background:var(--border);margin:0 6px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-top:12px}
.card:first-child{margin-top:0}
input,select,textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--info-text);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
textarea{resize:vertical;line-height:1.6}
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text)}
.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text)}
.btn-success{background:var(--success-bg);border-color:var(--success-border);color:var(--success-text)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.lbl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.bi{background:var(--info-bg);color:var(--info-text)}
.bs{background:var(--success-bg);color:var(--success-text)}
.bd{background:var(--danger-bg);color:var(--danger-text)}
.bg{background:var(--bg2);color:var(--text2)}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:5px}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .15s;margin-top:12px}
.drop-zone:hover,.drop-zone.over{border-color:var(--info-text);background:var(--info-bg)}
.tip{font-size:12px;color:var(--text2);padding:10px 14px;background:var(--bg2);border-radius:var(--r);border-left:3px solid var(--info-border);line-height:1.6;margin-top:10px}
.tip a{color:var(--info-text)}
.errtip{font-size:12px;color:var(--danger-text);padding:10px 14px;background:var(--danger-bg);border-radius:var(--r);border-left:3px solid var(--danger-border);line-height:1.6;margin-top:10px}
.pbar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px}
.pfill{height:100%;background:var(--info-text);border-radius:3px;transition:width .3s}
.email-panel{display:grid;grid-template-columns:270px 1fr;gap:1rem;align-items:start}
@media(max-width:700px){.email-panel{grid-template-columns:1fr}}
.lead-list{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ll-hdr{padding:9px 12px;font-size:12px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2)}
.ll-body{max-height:520px;overflow-y:auto}
.lr{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.lr:last-child{border-bottom:none}
.lr:hover{background:var(--bg2)}
.lr.active{background:var(--info-bg)}
.la{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:var(--bg3);color:var(--text2)}
.lr.active .la{background:var(--bg);color:var(--info-text)}
.email-detail{border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;display:flex;flex-direction:column;gap:14px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--info-text);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);gap:8px;margin-bottom:8px}
.sec{font-size:15px;font-weight:700;margin-bottom:14px}
h2{font-size:16px;font-weight:700}
.sub{font-size:13px;color:var(--text2);margin-top:4px}
.mt{margin-top:12px}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <h1>🛡️ Xcigence — AI Cold Email Agent</h1>
    <p>Upload leads → AI generates personalized emails → Review → Send via SendGrid</p>
  </div>
  <div id="root"></div>
</div>
<script>
// ── STATE ───────────────────────────────────────────────────
const S={
  step:0,leads:[],headers:[],
  colMap:{email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:'',companySize:'',revenue:''},
  sender:{name:'',email:'',title:'',company:'Xcigence'},
  emails:[],genProgress:0,activeIdx:0,sendStatus:{},dragOver:false,
  attachments:[],
  emailAngle:'pain',
  researchMode:false
};

// ── CSV ─────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  const pr=line=>{
    const r=[];let c='';let q=false;
    for(const ch of line){
      if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;
    }
    r.push(c.trim());return r;
  };
  const headers=pr(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const v=pr(l);const o={};headers.forEach((h,i)=>o[h]=v[i]||'');return o;
  });
  return{headers,rows};
}
function autoMap(headers){
  const map={email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:''};
  const v={email:['email','e-mail','mail'],fullName:['full name','fullname','contact name','name'],firstName:['first name','firstname','first','given'],lastName:['last name','lastname','surname','family'],company:['company','organization','org','account','employer','business'],title:['title','job title','position','role'],industry:['industry','sector','vertical','market']};
  headers.forEach(h=>{
    const hl=h.toLowerCase().trim();
    Object.entries(v).forEach(([k,vs])=>{if(!map[k]&&vs.some(vv=>hl===vv||hl.includes(vv)))map[k]=h;});
  });
  return map;
}
function getName(lead){
  return(lead[S.colMap.fullName]||((lead[S.colMap.firstName]||'')+' '+(lead[S.colMap.lastName]||'')).trim()||lead[S.colMap.email]||'Unknown').trim();
}

// ── AI CALL via proxy ───────────────────────────────────────
function getSystem(angle,companySize,revenue){
const angleInstructions={
  pain:"EMAIL ANGLE: PAIN-FOCUSED. Open by naming their single most pressing business risk — could be a cyberattack crippling operations, a breach destroying customer trust, or compliance failure triggering regulatory action. Make them feel the real business consequence before introducing the solution. Never lead with just a framework name.",
  roi:"EMAIL ANGLE: ROI-FOCUSED. Lead with the financial reality — the average data breach costs $4.88M (IBM 2024), ransomware attacks average 22 days of downtime, compliance failures cost 2-3x more than prevention. Show how Xcigence protects the balance sheet and reduces total risk cost by 60-70%.",
  risk:"EMAIL ANGLE: RISK-FOCUSED. Open with the real business consequences of a cyberattack or breach — operational shutdown, stock price collapse, customer churn, board accountability, executive liability, reputational damage that takes years to rebuild. Frame compliance and risk management as business survival, not just checkbox exercises.",
  proof:"EMAIL ANGLE: SOCIAL PROOF. Reference how similar companies in their industry recovered from or avoided breaches and compliance failures. Focus on business outcomes — revenue protected, operations kept running, customer trust maintained, regulatory fines avoided.",
  question:"EMAIL ANGLE: QUESTION-BASED. Open with one sharp business question — not a technical one. Something like: 'If your systems went down for 3 weeks from ransomware, what would that cost your business?' Make it visceral and real before connecting to Xcigence.",
  insight:"EMAIL ANGLE: INSIGHT-LED. Open with a surprising business insight — how a recent breach in their industry wiped out market cap, triggered lawsuits, or caused customer exodus. Connect the dots between poor cyber risk visibility and business vulnerability."
};
const angleText=angleInstructions[angle]||angleInstructions.pain;
return "You are an expert B2B sales copywriter for a cybersecurity company. You write emails that connect cybersecurity and compliance to real business outcomes — not just technical checklists. Write emails that land in the inbox, not spam.\n\n"+angleText+"\n\nPRODUCT: Xcigence — Automated Cybersecurity Risk Assessment & Data Privacy Compliance Automation\n\nWHAT XCIGENCE DOES:\n- Gives executives a continuous, real-time cybersecurity risk score and rating — like a credit score for cyber health\n- Automated compliance gap analysis across 12+ frameworks (SOC 2, ISO 27001, GDPR, HIPAA, CCPA, PCI DSS, NIST CSF, CIS Controls, FedRAMP, PIPEDA, DORA, ISO 27701)\n- AI-powered remediation roadmaps that show exactly what to fix and in what order\n- Audit-ready evidence collection in minutes, not months\n- 60-70% reduction in compliance costs vs manual audits\n- Third-party and vendor risk scoring\n- Business continuity risk visibility\n\nBUSINESS IMPACT ANGLES TO USE (pick what fits the lead):\n- Cyber attacks cost businesses an average of $4.88M per breach (IBM 2024)\n- Ransomware causes average 22 days of operational downtime — devastating for revenue\n- A data breach can erase 25-40% of company market value within days\n- 60% of small-to-mid businesses close within 6 months of a major cyberattack\n- Data breaches destroy customer trust — 81% of consumers stop doing business with a breached company\n- Regulatory fines can reach 4% of global annual revenue under GDPR\n- Cyber incidents trigger shareholder lawsuits, executive liability, and board accountability\n- Supply chain attacks can shut down entire operations overnight\n- Cyber insurance premiums have risen 50%+ — poor risk scores mean higher costs or denied coverage\n- Business continuity failures from cyber incidents can take months to recover from\n\nFRAMEWORK SELECTION (match to industry — never default to SOC 2 unless SaaS/tech):\n- Healthcare: HIPAA, HITECH — tie to patient data liability, OCR fines, operational disruption\n- Finance/Banking: PCI DSS, SOX, DORA, GLBA — tie to regulatory action, license risk, investor confidence\n- Government: FedRAMP, FISMA, CMMC, NIST CSF — tie to contract loss, national security obligations\n- Retail/E-commerce: PCI DSS, CCPA, GDPR — tie to customer data liability, payment system attacks\n- Manufacturing: NIST CSF, IEC 62443, ISO 27001 — tie to OT/IT attacks, production shutdown, supply chain risk\n- Legal/Professional Services: ISO 27001, GDPR, CCPA — tie to client confidentiality, malpractice exposure\n- Insurance: NAIC, SOX, ISO 27001 — tie to policyholder data, regulatory scrutiny\n- Education: FERPA, COPPA, ISO 27001 — tie to student data liability, ransomware targeting\n- SaaS/Technology: SOC 2, ISO 27001 — tie to enterprise customer trust, deal-blocking security reviews\n- Multinational/EU: GDPR, DORA — tie to cross-border data fines, operational resilience requirements\n- Canadian: PIPEDA, ISO 27001 — tie to privacy obligations, OPC enforcement\n\nROLE-SPECIFIC PAIN POINTS:\n- CISO: Board pressure, inability to quantify risk in business terms, alert fatigue, audit exhaustion\n- Compliance Officer/CCO: Framework sprawl, manual evidence collection, regulatory deadlines, audit costs\n- CFO/Finance: Breach costs destroying margins, rising cyber insurance premiums, compliance budget justification\n- CTO: Technical debt in security tooling, developer compliance burden, multi-cloud risk visibility\n- CEO/Executive: Reputational risk, investor confidence, operational resilience, competitive disadvantage\n- VP IT/IT Director: Tool consolidation, audit readiness without extra headcount, resource constraints\n- COO: Business continuity, operational risk, supply chain vulnerabilities\n\nDELIVERABILITY RULES:\n- NO spam trigger words: free, guarantee, risk-free, act now, limited time, click here, buy now, discount\n- NO all-caps, NO excessive punctuation (!!!, ???)\n- NO more than one URL\n- Write like a senior peer reaching out — not a sales pitch\n- Use recipient first name once naturally in the opening\n- Make the business impact visceral and specific — dollars lost, days of downtime, customers churned\n- Blend compliance obligation with business risk — they are two sides of the same coin\n- End with: If you would prefer not to hear from me, just reply and I will remove you.\n\nEMAIL STRUCTURE:\n1. Subject: business-outcome focused, under 50 chars, no spam words — avoid leading with just a framework acronym\n2. Opening: address by first name, immediately connect to a real business risk or consequence in their industry\n3. Middle: weave together the business cost of inaction + how Xcigence solves it with a specific stat or benefit\n4. CTA: soft ask for a 15-minute call to show them their risk score\n5. Sign-off: professional full name and title\n6. Final line: unsubscribe offer\n\nCOMPANY SIZE GUIDANCE (critical — always match stats and language to company size):\nIf company has 1-50 employees: Small business — use SMB-specific stats: '60% of small businesses close within 6 months of a major attack', focus on survival, lean teams, limited IT resources, wearing multiple hats.\nIf company has 51-500 employees: Mid-market — use mid-market language: operational disruption, growing compliance burden, scaling risk, limited dedicated security staff, increasing regulatory scrutiny as they grow.\nIf company has 501-5000 employees: Enterprise — use enterprise language: board accountability, shareholder value, reputational risk at scale, complex multi-framework compliance, large attack surface, vendor risk across hundreds of suppliers. Use stats like 'enterprise breaches average $4.88M in total cost'.\nIf company has 5000+ employees: Large enterprise/corporation — use C-suite language: market cap impact (breaches erase 25-40% of stock value), regulatory fines in tens of millions, class action lawsuits, global compliance obligations, SEC cyber disclosure requirements, investor confidence erosion.\nIf company size is unknown: Use neutral language that works across sizes — avoid SMB-specific survival stats for companies that may be large enterprises.\n\nNEVER apply SMB survival statistics (like '60% close within 6 months') to enterprise or large companies. NEVER apply enterprise board/shareholder language to small startups. Match the language, stakes, and statistics precisely to the company's scale.\n\nUnder 180 words total. Every email must feel written by someone who truly understands their business scale and risk profile. The goal is to make them think: this person gets exactly what we are dealing with.";
}
const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
async function callAI(lead){
  const name=getName(lead);
  const company=lead[S.colMap.company]||'your company';
  const title=lead[S.colMap.title]||'decision maker';
  const industry=lead[S.colMap.industry]||'technology';
  const companySize=lead[S.colMap.companySize]||'';
  const revenue=lead[S.colMap.revenue]||'';
  const prompt=getSystem(S.emailAngle,companySize,revenue)+'\n\nWrite a cold email to:\n- Name: '+name+'\n- Title: '+title+'\n- Company: '+company+'\n- Industry: '+industry+'\n- Company Size: '+(companySize||'unknown')+'\n- Revenue: '+(revenue||'unknown')+'\n- From: '+S.sender.name+', '+(S.sender.title||'Account Executive')+', '+S.sender.company+'\n\nRespond ONLY with valid JSON, no markdown fences:\n{"subject":"...","body":"..."}';

  const resp=await fetch('/.netlify/functions/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      prompt,
      company,
      industry,
      companySize,
      revenue,
      researchMode:S.researchMode
    })
  });
  const respText=await resp.text();
  if(resp.status===429){
    // Rate limited — wait 10 seconds and retry once
    await new Promise(r=>setTimeout(r,10000));
    const retry=await fetch('/.netlify/functions/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,company,industry,companySize,revenue,researchMode:S.researchMode})
    });
    const retryText=await retry.text();
    if(!retry.ok){
      let errMsg='HTTP '+retry.status+' (after retry)';
      try{const e=JSON.parse(retryText);errMsg=e.error||e.message||JSON.stringify(e);}catch(ex){}
      throw new Error(errMsg);
    }
    const retryData=JSON.parse(retryText);
    if(!retryData.content||!retryData.content[0])throw new Error('Empty retry response');
    const retryTxt=retryData.content[0].text.replace(/```json|```/g,'').trim();
    return JSON.parse(retryTxt);
  }
  if(!resp.ok){
    let errMsg='HTTP '+resp.status;
    try{const e=JSON.parse(respText);errMsg=e.error||e.message||JSON.stringify(e);}catch(ex){}
    throw new Error(errMsg);
  }
  let data;
  try{data=JSON.parse(respText);}catch(e){throw new Error('Invalid server response: '+respText.substring(0,200));}
  if(!data.content||!data.content[0]){throw new Error('Unexpected response structure: '+JSON.stringify(data).substring(0,200));}
  const txt=data.content[0].text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(txt);}catch(e){throw new Error('Could not parse JSON: '+txt.substring(0,200));}
}

// ── SENDGRID ────────────────────────────────────────────────
async function sendEmail(to,subject,body){
  const resp=await fetch('/.netlify/functions/send',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      to, subject, body,
      fromEmail: S.sender.email,
      fromName: S.sender.name,
      attachments: S.attachments
    })
  });
  const data=await resp.json();
  if(!data.success){console.error('Send error:',data.error);}
  return data.success===true;
}

// ── DOM HELPERS ──────────────────────────────────────────────
function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  kids.flat().forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}
function draw(){
  const r=document.getElementById('root');r.innerHTML='';
  r.appendChild(stepBar());
  r.appendChild([p0,p1,p2,p3,p4][S.step]());
}
function stepBar(){
  const names=['Upload Leads','Configure','Generate','Review & Edit','Send Campaign'];
  const bar=h('div',{style:{display:'flex',alignItems:'center',marginBottom:'1.5rem'}});
  names.forEach((s,i)=>{
    const cls='si'+(i===S.step?' active':i<S.step?' done':'');
    bar.appendChild(h('div',{cls},h('div',{cls:'sn'},i<S.step?'✓':String(i+1)),h('span',null,s)));
    if(i<names.length-1)bar.appendChild(h('div',{cls:'sdiv'}));
  });
  return bar;
}

// ── PAGE 0: UPLOAD ───────────────────────────────────────────
function p0(){
  const wrap=h('div',null);
  wrap.appendChild(h('div',{cls:'card'},h('h2',null,'Upload your lead list'),h('p',{cls:'sub'},'Upload a CSV. Required: Email + Company. Optional: Name, Job Title, Industry.')));
  let fi;
  const dz=h('div',{cls:'drop-zone'+(S.dragOver?' over':''),onClick:()=>fi.click(),
    onDragover:e=>{e.preventDefault();S.dragOver=true;draw();},
    onDragleave:()=>{S.dragOver=false;draw();},
    onDrop:e=>{e.preventDefault();S.dragOver=false;readFile(e.dataTransfer.files[0]);}},
    h('div',{style:{fontSize:'32px',marginBottom:'10px'}},'📂'),
    h('p',{style:{fontWeight:'600',marginBottom:'6px'}},'Drop your CSV file here'),
    h('p',{style:{fontSize:'13px',color:'var(--text2)'}},'or click to browse')
  );
  wrap.appendChild(dz);
  fi=document.createElement('input');fi.type='file';fi.accept='.csv';fi.style.display='none';
  fi.addEventListener('change',e=>{if(e.target.files[0])readFile(e.target.files[0]);});
  wrap.appendChild(fi);
  const tip=h('div',{cls:'tip',html:'<strong>Columns:</strong> First Name, Last Name, Email, Company, Job Title, Industry &nbsp;·&nbsp; <a href="#" id="dls">Download sample CSV</a>'});
  wrap.appendChild(tip);
  setTimeout(()=>{const a=document.getElementById('dls');if(a)a.onclick=e=>{e.preventDefault();dlSample();};},0);
  if(S.leads.length>0){
    const pv=h('div',{cls:'card'});
    pv.appendChild(h('div',{cls:'fb',style:{marginBottom:'8px'}},h('span',{style:{fontWeight:'700'}},'✓ '+S.leads.length+' leads loaded'),h('span',{cls:'badge bs'},S.leads.length+' rows')));
    const sample=S.leads.slice(0,3).map(r=>[getName(r),r[S.colMap.company]||''].filter(Boolean).join(' · ')).join('<br>');
    pv.appendChild(h('p',{style:{fontSize:'12px',color:'var(--text2)'},html:sample+(S.leads.length>3?'<br><em>...and '+(S.leads.length-3)+' more</em>':'')}));
    pv.appendChild(h('div',{style:{textAlign:'right',marginTop:'12px'}},h('button',{cls:'btn btn-primary',onClick:()=>{S.step=1;draw();}},'Map Columns & Configure →')));
    wrap.appendChild(pv);
  }
  return wrap;
}
function readFile(f){
  const rd=new FileReader();rd.onload=e=>{const{headers,rows}=parseCSV(e.target.result);S.headers=headers;S.leads=rows;S.colMap=autoMap(headers);draw();};rd.readAsText(f);
}
function dlSample(){
  const csv=`First Name,Last Name,Email,Company,Job Title,Industry\nJohn,Smith,john.smith@acme.com,Acme Financial,CISO,Financial Services\nSarah,Chen,s.chen@healthtech.io,HealthTech Inc,Chief Compliance Officer,Healthcare\nMike,Johnson,mike.j@retailco.com,RetailCo,VP of IT,Retail\nLisa,Park,l.park@mfg.com,Precision Mfg,Director of Risk,Manufacturing\nDavid,Lee,d.lee@techstartup.com,TechStartup Inc,CTO,Technology`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sample_leads.csv';a.click();
}

// ── PAGE 1: CONFIGURE ────────────────────────────────────────
function p1(){
  const wrap=h('div',null);
  const mc=h('div',{cls:'card'},h('p',{cls:'sec'},'Map your CSV columns'));
  const g=h('div',{cls:'g2'});
  [{k:'email',l:'Email *'},{k:'fullName',l:'Full Name'},{k:'firstName',l:'First Name'},{k:'lastName',l:'Last Name'},{k:'company',l:'Company *'},{k:'title',l:'Job Title'},{k:'industry',l:'Industry'},{k:'companySize',l:'Company Size (employees)'},{k:'revenue',l:'Annual Revenue'}].forEach(f=>{
    const d=h('div',null,h('div',{cls:'lbl'},f.l));
    const s=h('select',{onChange:e=>S.colMap[f.k]=e.target.value});
    s.appendChild(h('option',{value:''},'— not mapped —'));
    S.headers.forEach(hd=>{const o=h('option',{value:hd},hd);if(S.colMap[f.k]===hd)o.selected=true;s.appendChild(o);});
    d.appendChild(s);g.appendChild(d);
  });
  mc.appendChild(g);wrap.appendChild(mc);

  const sc=h('div',{cls:'card'},h('p',{cls:'sec'},'Your sender details'));
  const sg=h('div',{cls:'g2'});
  [{k:'name',l:'Your Full Name *',p:'Alex Rivera'},{k:'email',l:'Sender Email *',p:'alex@xcigence.com'},{k:'title',l:'Job Title',p:'Senior Account Executive'},{k:'company',l:'Company',p:'Xcigence'}].forEach(f=>{
    const d=h('div',null,h('div',{cls:'lbl'},f.l),h('input',{type:'text',placeholder:f.p,value:S.sender[f.k]||'',onInput:e=>S.sender[f.k]=e.target.value}));
    sg.appendChild(d);
  });
  sc.appendChild(sg);
  const stip=h('div',{cls:'tip',html:'Get your key from <a href="https://app.sendgrid.com/settings/api_keys" target="_blank">SendGrid → API Keys</a> with "Mail Send" permission. Your sender email must be verified in SendGrid. <strong>Keep your API key private — never share it publicly.</strong>'});
  sc.appendChild(stip);
  wrap.appendChild(sc);

  // Email Angle Selector
  const angles=[
    {val:'pain',    emoji:'🎯', label:'Pain-Focused',    desc:'Lead with their specific compliance pain point and urgency'},
    {val:'roi',     emoji:'💰', label:'ROI-Focused',     desc:'Lead with cost savings, time reduction and business value'},
    {val:'risk',    emoji:'⚠️', label:'Risk-Focused',    desc:'Lead with breach risk, regulatory fines and consequences'},
    {val:'proof',   emoji:'🏆', label:'Social Proof',    desc:'Lead with customer success stories and real results'},
    {val:'question',emoji:'❓', label:'Question-Based',  desc:'Open with a sharp question that makes them think'},
    {val:'insight', emoji:'💡', label:'Insight-Led',     desc:'Share an industry insight then connect it to your solution'}
  ];
  const angleCard=h('div',{cls:'card',style:{marginTop:'12px'}});
  angleCard.appendChild(h('p',{cls:'sec'},'Email Angle & Tone'));
  angleCard.appendChild(h('p',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'14px'}},'Choose the messaging angle for this campaign. Each angle generates completely different emails.'));
  const angleGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}});
  angles.forEach(a=>{
    const isActive=S.emailAngle===a.val;
    const card=h('div',{
      style:{
        padding:'12px',borderRadius:'var(--r)',cursor:'pointer',
        border: isActive?'2px solid var(--info-text)':'1px solid var(--border)',
        background: isActive?'var(--info-bg)':'var(--bg)',
        transition:'all .15s'
      },
      onClick:()=>{S.emailAngle=a.val;draw();}
    },
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}},
        h('span',{style:{fontSize:'18px'}},a.emoji),
        h('span',{style:{fontWeight:'700',fontSize:'13px',color:isActive?'var(--info-text)':'var(--text)'}} ,a.label),
        isActive?h('span',{style:{marginLeft:'auto',fontSize:'11px',color:'var(--info-text)',fontWeight:'700'}},'✓ Selected'):null
      ),
      h('p',{style:{fontSize:'12px',color:'var(--text2)',lineHeight:'1.4'}},a.desc)
    );
    angleGrid.appendChild(card);
  });
  angleCard.appendChild(angleGrid);
  wrap.appendChild(angleCard);

  // Research Mode Toggle
  const researchCard=h('div',{cls:'card',style:{marginTop:'12px'}});
  const researchRow=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}});
  const researchLeft=h('div',null,
    h('p',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'4px'}},'🔍 AI Research Mode'),
    h('p',{style:{fontSize:'12px',color:'var(--text2)',lineHeight:'1.5'}},'When enabled, the AI automatically searches the web for each company before writing. It researches their website, recent news, and the latest cybersecurity threats in their industry — then crafts a hyper-personalized email using real, current context.')
  );
  const toggle=h('div',{
    style:{
      width:'52px',height:'28px',borderRadius:'14px',cursor:'pointer',flexShrink:'0',
      background:S.researchMode?'var(--success-text)':'var(--border2)',
      transition:'background .2s',position:'relative',display:'flex',alignItems:'center',padding:'3px'
    },
    onClick:()=>{S.researchMode=!S.researchMode;draw();}
  });
  const knob=h('div',{style:{
    width:'22px',height:'22px',borderRadius:'50%',background:'white',
    transition:'transform .2s',
    transform:S.researchMode?'translateX(24px)':'translateX(0)'
  }});
  toggle.appendChild(knob);
  researchRow.appendChild(researchLeft);
  researchRow.appendChild(h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}},toggle,h('span',{style:{fontSize:'11px',fontWeight:'700',color:S.researchMode?'var(--success-text)':'var(--text2)'}},S.researchMode?'ON':'OFF')));
  researchCard.appendChild(researchRow);
  if(S.researchMode){
    const warn=h('div',{style:{marginTop:'12px',padding:'10px 12px',background:'var(--warn-bg)',borderRadius:'var(--r)',border:'1px solid var(--warn-border)',fontSize:'12px',color:'var(--warn-text)'}});
    warn.innerHTML='<strong>⏱ Note:</strong> Research mode takes 15-30 seconds per lead as it searches the web for each company. Best used for high-value prospects. Disable for large lists of 50+ leads.';
    researchCard.appendChild(warn);
  }
  wrap.appendChild(researchCard);

  const ok=()=>S.colMap.email&&S.colMap.company&&S.sender.name&&S.sender.email;
  wrap.appendChild(h('div',{cls:'fb',style:{marginTop:'14px'}},
    h('button',{cls:'btn',onClick:()=>{S.step=0;draw();}},'← Back'),
    h('button',{cls:'btn btn-primary',style:{opacity:ok()?1:.5},onClick:()=>{
      if(!ok()){alert('Please map Email and Company columns, and enter your Name and Sender Email.');return;}
      S.step=2;S.emails=[];S.genProgress=0;S.sendStatus={};draw();runGenerate();
    }},'Generate '+S.leads.length+' Emails →')
  ));
  return wrap;
}

// ── PAGE 2: GENERATING ───────────────────────────────────────
function p2(){
  const pct=S.leads.length>0?Math.round(S.genProgress/S.leads.length*100):0;
  const latest=S.emails.length>0?S.emails[S.emails.length-1]:null;
  return h('div',{cls:'card',style:{textAlign:'center',padding:'3rem 2rem'}},
    h('div',{style:{fontSize:'36px',marginBottom:'14px'}},'🤖'),
    h('h2',{style:{marginBottom:'6px'}},'Generating personalized emails'),
    h('p',{cls:'sub'},'Tailoring each email to the lead\'s industry, role, and company... (3s delay between emails to avoid rate limits)'),
    h('div',{style:{margin:'20px auto',maxWidth:'440px'}},
      h('div',{cls:'fb',style:{marginBottom:'5px'}},h('span',{style:{fontSize:'12px',color:'var(--text2)'}},S.genProgress+' of '+S.leads.length+' generated'),h('span',{style:{fontSize:'12px',fontWeight:'700'}},pct+'%')),
      h('div',{cls:'pbar'},h('div',{cls:'pfill',style:{width:pct+'%'}}))
    ),
    latest?h('div',{style:{textAlign:'left',maxWidth:'440px',margin:'14px auto 0'}},
      h('p',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'6px'}},'Latest generated:'),
      h('div',{style:{background:'var(--bg2)',borderRadius:'var(--r)',padding:'12px',fontSize:'12px'}},
        h('p',{style:{fontWeight:'700',marginBottom:'4px'}},latest.subject),
        h('p',{style:{color:'var(--text2)'}},latest.body.substring(0,100)+'...')
      )
    ):null
  );
}
async function runGenerate(){
  for(let i=0;i<S.leads.length;i++){
    try{
      const{subject,body}=await callAI(S.leads[i]);
      S.emails.push({id:i,lead:S.leads[i],subject,body,approved:true,error:false,researched:S.researchMode});
    }catch(err){
      S.emails.push({id:i,lead:S.leads[i],subject:'[Failed — click Regenerate]',body:'Generation failed: '+err.message,approved:false,error:true});
    }
    S.genProgress=i+1;draw();
    await new Promise(r=>setTimeout(r,3000)); // 3s delay to avoid Anthropic rate limits
  }
  S.step=3;S.activeIdx=0;draw();
}

// ── PAGE 3: REVIEW ───────────────────────────────────────────
function p3(){
  const wrap=h('div',null);
  const approved=S.emails.filter(e=>e.approved).length;
  const failed=S.emails.filter(e=>e.error).length;
  const g4=h('div',{cls:'g4',style:{marginBottom:'14px'}});
  [{v:S.emails.length,l:'Generated'},{v:approved,l:'Approved'},{v:S.emails.length-approved,l:'Excluded'},{v:failed,l:'Failed'}].forEach(s=>{
    g4.appendChild(h('div',{cls:'stat-card'},h('div',{cls:'stat-val'},String(s.v)),h('div',{cls:'stat-lbl'},s.l)));
  });
  wrap.appendChild(g4);

  const panel=h('div',{cls:'email-panel'});
  const list=h('div',{cls:'lead-list'});
  list.appendChild(h('div',{cls:'ll-hdr'},'Leads ('+S.emails.length+')'));
  const lb=h('div',{cls:'ll-body'});
  S.emails.forEach((e,i)=>{
    const nm=getName(e.lead).substring(0,22);
    const co=(e.lead[S.colMap.company]||'').substring(0,20);
    const ini=nm.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2)||'?';
    lb.appendChild(h('div',{cls:'lr'+(i===S.activeIdx?' active':''),onClick:()=>{S.activeIdx=i;draw();}},
      h('div',{cls:'la'},ini),
      h('div',{style:{flex:'1',minWidth:'0'}},
        h('div',{style:{fontWeight:'700',fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},nm),
        h('div',{style:{fontSize:'11px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},co)
      ),
      e.error?h('span',{cls:'badge bd'},'ERR'):e.researched?h('span',{cls:'badge bs'},'🔍✓'):e.approved?h('span',{cls:'badge bs'},'✓'):h('span',{cls:'badge bg'},'—')
    ));
  });
  list.appendChild(lb);panel.appendChild(list);

  const ae=S.emails[S.activeIdx];
  const det=h('div',{cls:'email-detail'});
  if(ae){
    det.appendChild(h('div',{cls:'fb'},
      h('div',null,h('p',{style:{fontWeight:'700'}},getName(ae.lead)),h('p',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'2px'}},[ae.lead[S.colMap.title],ae.lead[S.colMap.company]].filter(Boolean).join(' · '))),
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
        ae.lead[S.colMap.industry]?h('span',{cls:'badge bg'},ae.lead[S.colMap.industry]):null,
        ae.lead[S.colMap.email]?h('span',{cls:'badge bi'},ae.lead[S.colMap.email]):null
      )
    ));
    if(ae.error){det.appendChild(h('div',{style:{background:'var(--danger-bg)',border:'1px solid var(--danger-border)',borderRadius:'var(--r)',padding:'10px',fontSize:'12px',color:'var(--danger-text)'}},ae.body));}
    // Subject line + Rewrite Body button
    const subjWrap=h('div',null);
    subjWrap.appendChild(h('div',{cls:'lbl'},'Subject line — edit it, then click "Rewrite Body" to regenerate body based on your subject'));
    const subjRow=h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginTop:'4px'}});
    const subjInp=document.createElement('input');
    subjInp.type='text';subjInp.style.fontWeight='700';subjInp.style.flex='1';
    subjInp.value=ae.subject;
    subjInp.addEventListener('input',function(e){S.emails[S.activeIdx].subject=e.target.value;});
    const rewriteBtn=document.createElement('button');
    rewriteBtn.className='btn btn-primary btn-sm';
    rewriteBtn.style.whiteSpace='nowrap';
    rewriteBtn.textContent='Rewrite Body';
    rewriteBtn.addEventListener('click',async function(){
      const idx=S.activeIdx;
      const lead=S.emails[idx].lead;
      const customSubject=subjInp.value.trim();
      if(!customSubject){alert('Please enter a subject line first.');return;}
      this.disabled=true;this.textContent='Rewriting...';
      const name=getName(lead);
      const company=lead[S.colMap.company]||'your company';
      const title=lead[S.colMap.title]||'decision maker';
      const industry=lead[S.colMap.industry]||'technology';
      const companySize2=lead[S.colMap.companySize]||'';
      const revenue2=lead[S.colMap.revenue]||'';
      const sysPrompt=getSystem(S.emailAngle,companySize2,revenue2);
      const prompt=sysPrompt+'\n\nWrite ONLY the email body (no subject line) for this lead. The body MUST directly follow and expand on this exact subject line:\nSUBJECT: "'+customSubject+'"\n\nThe opening line must connect directly to the subject. Personalize for their industry and role.\n\nLead details:\n- Name: '+name+'\n- Title: '+title+'\n- Company: '+company+'\n- Industry: '+industry+'\n- From: '+S.sender.name+', '+(S.sender.title||'Account Executive')+', '+S.sender.company+'\n\nRespond ONLY with valid JSON, no markdown:\n{"body":"..."}';
      try{
        const resp=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,company:company,industry:industry,researchMode:S.researchMode})});
        const respText=await resp.text();
        const data=JSON.parse(respText);
        // Extract text from content blocks (handles tool-use responses too)
        let txt='';
        if(data.content&&Array.isArray(data.content)){
          for(const block of data.content){if(block.type==='text')txt+=block.text;}
        } else if(data.error){throw new Error(data.error.message||JSON.stringify(data.error));}
        txt=txt.replace(/```json|```/g,'').trim();
        const jsonStart=txt.indexOf('{');const jsonEnd=txt.lastIndexOf('}');
        if(jsonStart>=0&&jsonEnd>jsonStart){
          const parsed=JSON.parse(txt.substring(jsonStart,jsonEnd+1));
          S.emails[idx].body=parsed.body||txt;
          S.emails[idx].subject=customSubject;
          S.emails[idx].approved=true;S.emails[idx].error=false;draw();
        }else if(txt.length>20){
          S.emails[idx].body=txt;S.emails[idx].subject=customSubject;
          S.emails[idx].approved=true;draw();
        }else{throw new Error('Could not parse email from response: '+txt.substring(0,100));}
      }catch(e){alert('Rewrite failed: '+e.message);}
      this.disabled=false;this.textContent='Rewrite Body';
    });
    subjRow.appendChild(subjInp);
    subjRow.appendChild(rewriteBtn);
    subjWrap.appendChild(subjRow);
    det.appendChild(subjWrap);
    const ta=document.createElement('textarea');ta.style.minHeight='190px';ta.value=ae.body;ta.addEventListener('input',function(e){S.emails[S.activeIdx].body=e.target.value;});
    det.appendChild(h('div',null,h('div',{cls:'lbl'},'Email body — edit directly or use "Rewrite Body" above to regenerate from your subject'),ta));
    det.appendChild(h('div',{cls:'fb'},
      h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{cls:'btn btn-sm '+(ae.approved&&!ae.error?'btn-danger':'btn-success'),onClick:()=>{S.emails[S.activeIdx].approved=!S.emails[S.activeIdx].approved;draw();}},ae.approved&&!ae.error?'✗ Exclude':'✓ Include'),
        h('button',{cls:'btn btn-sm',onClick:async function(){
          this.disabled=true;this.textContent='Regenerating...';
          try{const{subject,body}=await callAI(ae.lead);S.emails[S.activeIdx].subject=subject;S.emails[S.activeIdx].body=body;S.emails[S.activeIdx].approved=true;S.emails[S.activeIdx].error=false;}
          catch(err){S.emails[S.activeIdx].body='Failed: '+err.message;S.emails[S.activeIdx].error=true;}
          draw();
        }},'↺ Regenerate')
      ),
      h('button',{cls:'btn btn-primary',onClick:()=>{S.step=4;draw();}},'Proceed to Send →')
    ));
  }
  panel.appendChild(det);wrap.appendChild(panel);
  return wrap;
}

// ── PAGE 4: SEND ─────────────────────────────────────────────
function p4(){
  const wrap=h('div',null);
  const approved=S.emails.filter(e=>e.approved&&!e.error);
  const sent=Object.values(S.sendStatus).filter(s=>s==='sent').length;
  const failed=Object.values(S.sendStatus).filter(s=>s==='error').length;

  const g4=h('div',{cls:'g4',style:{marginBottom:'14px'}});
  [{v:approved.length,l:'Approved'},{v:sent,l:'Sent'},{v:failed,l:'Failed'},{v:approved.length-sent-failed,l:'Pending'}].forEach(s=>{
    g4.appendChild(h('div',{cls:'stat-card'},h('div',{cls:'stat-val'},String(s.v)),h('div',{cls:'stat-lbl'},s.l)));
  });
  wrap.appendChild(g4);

  const ac=h('div',{cls:'card'});
  ac.appendChild(h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
    h('button',{cls:'btn btn-primary',onClick:()=>sendAll(approved)},'▶ Send All ('+approved.length+')'),
    h('button',{cls:'btn',onClick:doExport},'↓ Export CSV'),
    h('button',{cls:'btn',onClick:()=>{S.step=3;draw();}},'← Edit Emails')
  ));
  if(sent>0){
    const pct=Math.round(sent/approved.length*100);
    ac.appendChild(h('div',{style:{marginTop:'10px'}},h('div',{cls:'fb',style:{marginBottom:'4px'}},h('span',{style:{fontSize:'12px',color:'var(--text2)'}},sent+' of '+approved.length+' sent'),h('span',{style:{fontSize:'12px',fontWeight:'700'}},pct+'%')),h('div',{cls:'pbar'},h('div',{cls:'pfill',style:{width:pct+'%'}}))));
  }
  wrap.appendChild(ac);

  // Check if email column mapping looks wrong
  const badEmails=approved.filter(e=>!emailRegex.test((e.lead[S.colMap.email]||'').trim()));
  if(badEmails.length>0){
    const warn=h('div',{style:{background:'var(--danger-bg)',border:'1px solid var(--danger-border)',borderRadius:'var(--r)',padding:'14px',marginBottom:'12px',color:'var(--danger-text)'}});
    warn.innerHTML=`<strong>⚠️ Email column mapping issue!</strong><br><br>${badEmails.length} lead(s) have invalid email addresses. The "Email" column in Step 2 may be mapped to the wrong CSV column.<br><br><strong>Example:</strong> "${(badEmails[0].lead[S.colMap.email]||'empty')}" is not a valid email.<br><br>Go back to <strong>Step 2 (Configure)</strong> and re-map the Email column to the correct column in your CSV.`;
    const fixBtn=h('button',{cls:'btn btn-danger',style:{marginTop:'10px'},onClick:()=>{S.step=1;draw();}},'← Fix Column Mapping');
    warn.appendChild(fixBtn);
    wrap.appendChild(warn);
  }

  if(approved.length===0){
    wrap.appendChild(h('div',{cls:'card',style:{textAlign:'center',padding:'2.5rem'}},h('div',{style:{fontSize:'32px',marginBottom:'12px'}},'📭'),h('h2',{style:{marginBottom:'8px'}},'No approved emails'),h('p',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'14px'}},'Go back and mark emails as approved (✓).'),h('button',{cls:'btn btn-primary',onClick:()=>{S.step=3;draw();}},'← Back to Review')));
    return wrap;
  }

  const lc=h('div',{cls:'card'});
  lc.appendChild(h('p',{style:{fontWeight:'700',marginBottom:'14px'}},'Email queue ('+approved.length+' emails)'));
  approved.forEach(ed=>{
    const id=ed.id;const st=S.sendStatus[id];
    const nm=getName(ed.lead).substring(0,28);
    const co=(ed.lead[S.colMap.company]||'').substring(0,24);
    const toEmail=ed.lead[S.colMap.email]||'';
    const row=h('div',{cls:'srow'});
    row.appendChild(h('div',{style:{flex:'1',minWidth:'0'}},
      h('p',{style:{fontWeight:'700',fontSize:'13px'}},nm+(co?' · ':'')+co),
      h('p',{style:{fontSize:'12px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ed.subject)
    ));
    row.appendChild(h('span',{style:{fontSize:'12px',color:'var(--text2)',flexShrink:'0',maxWidth:'170px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},toEmail));
    const se=h('div',{style:{flexShrink:'0'}});
    if(st==='sent')se.appendChild(h('span',{cls:'badge bs'},'✓ Sent'));
    else if(st==='error')se.appendChild(h('span',{cls:'badge bd'},'✗ Failed'));
    else if(st==='sending')se.appendChild(h('span',{cls:'spin'}));
    else se.appendChild(h('button',{cls:'btn btn-sm btn-primary',onClick:async function(){
      S.sendStatus[id]='sending';draw();
      if(!emailRegex.test(toEmail)){S.sendStatus[id]='error';alert('Invalid email address: "'+toEmail+'"\n\nPlease go back to Step 2 and make sure the Email column is correctly mapped to the email address column in your CSV.');draw();return;}
      try{const ok=await sendEmail(toEmail,ed.subject,ed.body);S.sendStatus[id]=ok?'sent':'error';}catch(e){console.error('Send error:',e.message);S.sendStatus[id]='error';}
      draw();
    }},'Send'));
    
    row.appendChild(se);lc.appendChild(row);
  });
  wrap.appendChild(lc);
  return wrap;
}

async function sendAll(approved){
  
  for(const ed of approved){
    const id=ed.id;if(S.sendStatus[id]==='sent')continue;
    S.sendStatus[id]='sending';draw();
    try{const ok=await sendEmail(ed.lead[S.colMap.email]||'',ed.subject,ed.body);S.sendStatus[id]=ok?'sent':'error';}
    catch{S.sendStatus[id]='error';}
    draw();await new Promise(r=>setTimeout(r,300));
  }
}
function doExport(){
  const approved=S.emails.filter(e=>e.approved&&!e.error);
  if(!approved.length){alert('No approved emails to export.');return;}
  const hdrs=['To Name','To Email','Company','Job Title','Industry','Subject','Body'];
  const csv=[hdrs,...approved.map(e=>[getName(e.lead),e.lead[S.colMap.email]||'',e.lead[S.colMap.company]||'',e.lead[S.colMap.title]||'',e.lead[S.colMap.industry]||'',e.subject,e.body])].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='cold_emails.csv';a.click();
}

draw();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Velorah — LinkedIn Campaigns</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c18;--bg2:#0d1526;--bg3:#111e35;
  --text:#e8f0fe;--text2:#7b91b4;--text3:#4a5f80;
  --blue:#3b82f6;--blue-dim:#1e3a6e;--blue-glow:rgba(59,130,246,.2);
  --cyan:#06b6d4;--green:#10b981;--red:#ef4444;
  --gold:#f59e0b;--purple:#8b5cf6;--li:#0077b5;
  --border:rgba(59,130,246,.15);--border2:rgba(59,130,246,.3);
  --glass:rgba(255,255,255,.03);--r:10px;--rl:14px;
}
body{font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(59,130,246,.08),transparent 60%),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(0,119,181,.06),transparent 60%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.topbar{position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(7,12,24,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:14px}
.brand-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,#e8f0fe,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:2px;margin-left:12px}
.nav a{font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px;text-decoration:none;color:var(--text2);transition:all .2s}
.nav a:hover{color:var(--text);background:rgba(59,130,246,.08)}
.nav a.active{color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1.5rem}
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:16px;background:linear-gradient(var(--blue),var(--cyan));border-radius:2px}
.lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
input,select,textarea{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:rgba(13,21,38,.8);color:var(--text);font-family:'Outfit',sans-serif;transition:all .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
textarea{resize:vertical;line-height:1.6}
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:9px 18px;border:1px solid var(--border);border-radius:var(--r);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s}
.btn:hover{border-color:var(--border2);background:rgba(59,130,246,.08)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--blue),#2563eb);border-color:var(--blue);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-primary:hover{box-shadow:0 4px 25px rgba(59,130,246,.5);transform:translateY(-1px)}
.btn-li{background:linear-gradient(135deg,#0077b5,#005885);border-color:#0077b5;color:#fff;box-shadow:0 4px 15px rgba(0,119,181,.3)}
.btn-li:hover{box-shadow:0 4px 25px rgba(0,119,181,.5);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);border-color:var(--green);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.tip{font-size:12px;color:var(--text2);padding:10px 14px;background:rgba(59,130,246,.06);border-radius:var(--r);border-left:3px solid var(--blue-dim);line-height:1.6;margin-top:8px}
.warn{font-size:12px;padding:10px 14px;background:rgba(245,158,11,.08);border-radius:var(--r);border-left:3px solid var(--gold);color:var(--gold);margin-top:8px;line-height:1.5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.step-pill{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:13px;flex-shrink:0;box-shadow:0 0 10px rgba(59,130,246,.4)}
.step-done{background:var(--green)!important;box-shadow:0 0 10px rgba(16,185,129,.4)!important}
.li-step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.li-step-content{flex:1}
.li-step-title{font-weight:700;margin-bottom:4px;font-size:14px}
.li-step-desc{font-size:12px;color:var(--text2);line-height:1.6}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--text)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:rgba(13,21,38,.5);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(59,130,246,.04)}
.cb{width:14px;height:14px;cursor:pointer;accent-color:var(--blue)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}}
.stat{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}

/* MESSAGE PANEL */
.msg-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.msg-panel{grid-template-columns:1fr}}
.msg-box{background:rgba(13,21,38,.6);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.msg-box-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}

/* PBAR */
.pbar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:6px}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;transition:width .4s}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:var(--rl);padding:2.5rem;text-align:center;cursor:pointer;transition:all .3s;background:var(--glass)}
.drop-zone:hover,.drop-zone.over{border-color:var(--li);background:rgba(0,119,181,.05)}
.drop-icon{font-size:40px;margin-bottom:12px}

/* SCORE BAR */
.score-hot{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.score-warm{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid var(--border2)}
.score-cold{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
</style>
</head>
<body>

<div class="topbar">
  <div class="flex" style="gap:0">
    <div class="brand">
      <div class="brand-logo">✉</div>
      <span class="brand-name">Velorah</span>
    </div>
    <nav class="nav">
      <a href="/app.html">🚀 Campaigns</a>
      <a href="/find-leads.html">🔍 Find Leads</a>
      <a href="/linkedin.html" class="active">💼 LinkedIn</a>
      <a href="/visitors.html">🌐 Visitors</a>
      <a href="/history.html">📋 History</a>
    </nav>
  </div>
  <div class="flex">
    <span id="user-email" style="font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace"></span>
    <button class="btn btn-sm" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="page">

  <!-- Header -->
  <div class="card" style="background:linear-gradient(135deg,rgba(0,119,181,.08),rgba(59,130,246,.05));border-color:rgba(0,119,181,.2);margin-bottom:1.25rem">
    <div class="fb">
      <div>
        <h1 style="font-size:20px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px">
          <span style="font-size:28px">💼</span>
          <span style="background:linear-gradient(135deg,#e8f0fe,#0077b5);-webkit-background-clip:text;-webkit-text-fill-color:transparent">LinkedIn Campaign Agent</span>
        </h1>
        <p style="font-size:13px;color:var(--text2)">Import connections → Filter by title/location → Generate personalized messages → Email or LinkedIn outreach</p>
      </div>
      <a href="https://www.linkedin.com/mynetwork/invite-connect/connections/" target="_blank" class="btn btn-li">💼 Open LinkedIn Connections</a>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('import',this)">Step 1: Import</div>
    <div class="tab" onclick="switchTab('filter',this)">Step 2: Filter & Enrich</div>
    <div class="tab" onclick="switchTab('compose',this)">Step 3: Compose</div>
    <div class="tab" onclick="switchTab('send',this)">Step 4: Send</div>
  </div>

  <div id="tab-content"></div>
</div>

<script>
const SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
const sbClient=window.supabase.createClient(SB_URL,SB_KEY);
let _session=null;

// State
const S={
  raw:[],          // raw LinkedIn CSV rows
  filtered:[],     // after filtering
  enriched:[],     // after email enrichment
  selected:new Set(),
  filters:{titles:[],locations:[],companies:[],keywords:''},
  customTitles:[],
  channel:'both',  // 'email' | 'linkedin' | 'both'
  emailAngle:'pain',
  sender:{name:'',email:'',company:'Velorah'},
  messages:[],     // [{contact, email:{subject,body}, linkedin:text}]
  generating:false,
  genProgress:0
};

const TITLE_PRESETS=['CISO','CTO','CEO','VP of Security','Chief Security Officer','Security Manager','Head of IT','Director of Technology','VP of IT','Chief Information Officer'];

async function init(){
  const{data:{session}}=await sbClient.auth.getSession();
  if(!session){window.location.href='/login.html';return;}
  _session=session;
  document.getElementById('user-email').textContent=session.user.email;
  try{const r=await fetch('/.netlify/functions/user-keys',{headers:{'Authorization':'Bearer '+session.access_token}});const{keys}=await r.json();if(keys){S.sender.name=keys.sender_name||'';S.sender.email=keys.sender_email||'';S.sender.company=keys.sender_company||'Velorah';}}catch(e){}
  switchTab('import',document.querySelector('.tab.active'));
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const tabs={import:renderImport,filter:renderFilter,compose:renderCompose,send:renderSend};
  const fn=tabs[tab];if(fn)document.getElementById('tab-content').innerHTML='',document.getElementById('tab-content').appendChild(fn());
}

// -- TAB 1: IMPORT -----------------------------------------
function renderImport(){
  const wrap=document.createElement('div');

  // Step-by-step instructions
  const steps=document.createElement('div');steps.className='card';
  steps.innerHTML=`<div class="card-title">How to Export Your LinkedIn Connections</div>
  <div class="li-step">
    <div class="step-pill${S.raw.length?''>':''}">1</div>
    <div class="li-step-content">
      <div class="li-step-title">Go to LinkedIn Data Export</div>
      <div class="li-step-desc">Click the button below - it opens directly to the LinkedIn data export page in a new tab.</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <a href="https://www.linkedin.com/mynetwork/invite-connect/connections/" target="_blank" class="btn btn-li btn-sm">💼 Open LinkedIn Connections</a>
        <a href="https://www.linkedin.com/settings/data-privacy/download-your-data" target="_blank" class="btn btn-sm" style="border-color:rgba(0,119,181,.3);color:#0077b5">⚙️ LinkedIn Data Export Settings</a>
      </div>
    </div>
  </div>
  <div class="li-step">
    <div class="step-pill">2</div>
    <div class="li-step-content">
      <div class="li-step-title">Request Your Connections File</div>
      <div class="li-step-desc">On the Data Privacy page: Select <strong style="color:var(--text)">"Connections"</strong> checkbox -> Click <strong style="color:var(--text)">"Request archive"</strong> -> LinkedIn emails you a download link (usually within 10 minutes).</div>
    </div>
  </div>
  <div class="li-step">
    <div class="step-pill">3</div>
    <div class="li-step-content">
      <div class="li-step-title">Download & Upload Here</div>
      <div class="li-step-desc">Open the email from LinkedIn -> download the ZIP -> extract -> upload <strong style="color:var(--text)">Connections.csv</strong> below. Velorah auto-cleans and organizes it.</div>
    </div>
  </div>
  <div class="warn" style="margin-top:0">⚠️ LinkedIn only includes email addresses for connections who have allowed it. Velorah will automatically find missing emails via Hunter.io and Lusha.</div>`;
  wrap.appendChild(steps);

  // Drop zone
  const dzCard=document.createElement('div');dzCard.className='card';
  let fi;
  const dz=document.createElement('div');dz.className='drop-zone'+(S.raw.length?' over':'');
  dz.innerHTML=`<div class="drop-icon">${S.raw.length?'✅':'💼'}</div><p style="font-weight:700;font-size:15px;margin-bottom:6px">${S.raw.length?S.raw.length+' connections loaded':'Drop your LinkedIn Connections.csv here'}</p><p style="font-size:13px;color:var(--text2)">${S.raw.length?'Upload a new file to replace':'or click to browse - Velorah auto-cleans LinkedIn\'s format'}</p>`;
  dz.onclick=()=>fi.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add('over');};
  dz.ondragleave=()=>dz.classList.remove('over');
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])readLinkedInCSV(e.dataTransfer.files[0]);};
  fi=document.createElement('input');fi.type='file';fi.accept='.csv';fi.style.display='none';
  fi.onchange=e=>{if(e.target.files[0])readLinkedInCSV(e.target.files[0]);};
  dzCard.appendChild(dz);dzCard.appendChild(fi);

  if(S.raw.length){
    // Preview stats
    const statsDiv=document.createElement('div');statsDiv.style.marginTop='14px';
    const companies=new Set(S.raw.map(r=>r.company).filter(Boolean));
    const withEmail=S.raw.filter(r=>r.email).length;
    statsDiv.innerHTML=`<div class="stats-row">
      <div class="stat"><div class="stat-val" style="color:var(--blue)">${S.raw.length}</div><div class="stat-lbl">Total Connections</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)">${withEmail}</div><div class="stat-lbl">Have Email</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--text2)">${S.raw.length-withEmail}</div><div class="stat-lbl">Need Enrichment</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--cyan)">${companies.size}</div><div class="stat-lbl">Companies</div></div>
    </div>`;
    dzCard.appendChild(statsDiv);

    // Sample table
    const tableWrap=document.createElement('div');tableWrap.style.marginTop='12px';tableWrap.style.overflowX='auto';
    const sample=S.raw.slice(0,5);
    tableWrap.innerHTML=`<p style="font-size:12px;color:var(--text2);margin-bottom:8px">Preview (first 5 of ${S.raw.length}):</p>
    <table><thead><tr><th>Name</th><th>Title</th><th>Company</th><th>Email</th><th>Location</th><th>Connected</th></tr></thead><tbody>
    ${sample.map(r=>`<tr><td><strong>${r.firstName} ${r.lastName}</strong></td><td style="font-size:12px">${r.title||'-'}</td><td style="font-size:12px">${r.company||'-'}</td><td style="font-size:11px;color:${r.email?'var(--green)':'var(--red)'}">${r.email||'No email'}</td><td style="font-size:11px">${r.location||'-'}</td><td style="font-size:11px;color:var(--text2)">${r.connectedOn||'-'}</td></tr>`).join('')}
    </tbody></table>`;
    dzCard.appendChild(tableWrap);

    const nextBtn=document.createElement('div');nextBtn.style.cssText='text-align:right;margin-top:14px';
    const nb=document.createElement('button');nb.className='btn btn-primary';nb.textContent='Filter & Enrich Connections ->';
    nb.onclick=()=>switchTab('filter',document.querySelectorAll('.tab')[1]);
    nextBtn.appendChild(nb);dzCard.appendChild(nextBtn);
  }
  wrap.appendChild(dzCard);return wrap;
}

function readLinkedInCSV(file){
  const rd=new FileReader();
  rd.onload=e=>{
    const text=e.target.result;
    const lines=text.split(/\r?\n/).filter(l=>l.trim());

    // LinkedIn CSV has 3 header lines of notes, then actual headers
    // Find the real header row (contains "First Name" or "Email Address")
    let headerIdx=0;
    for(let i=0;i<Math.min(10,lines.length);i++){
      if(lines[i].includes('First Name')||lines[i].includes('Email Address')||lines[i].includes('Connected On')){
        headerIdx=i;break;
      }
    }

    const parseRow=line=>{const r=[];let c='',q=false;for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim().replace(/^"|"$/g,''));c='';}else c+=ch;}r.push(c.trim().replace(/^"|"$/g,''));return r;};
    const headers=parseRow(lines[headerIdx]).map(h=>h.trim());
    const rows=lines.slice(headerIdx+1).filter(l=>l.trim());

    const idx=(name)=>headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
    const fi=idx('first');const li2=idx('last');const ei=idx('email');const ti=idx('position');const ci=idx('company');const loci=idx('location')||idx('city');const doi=idx('connected');const urli=idx('url')||idx('linkedin');

    S.raw=rows.map(row=>{
      const v=parseRow(row);
      return{
        firstName: v[fi]||'',
        lastName:  v[li2]||'',
        email:     v[ei]||'',
        title:     v[ti]||'',
        company:   v[ci]||'',
        location:  loci>=0?v[loci]:'',
        connectedOn:doi>=0?v[doi]:'',
        linkedinUrl:urli>=0?v[urli]:'',
        source:'linkedin'
      };
    }).filter(r=>r.firstName||r.lastName||r.email);

    S.filtered=[...S.raw];
    switchTab('import',document.querySelector('.tab.active'));
  };
  rd.readAsText(file);
}

// -- TAB 2: FILTER & ENRICH ---------------------------------
function renderFilter(){
  const wrap=document.createElement('div');
  if(!S.raw.length){
    const empty=document.createElement('div');empty.className='card';
    empty.innerHTML='<div class="empty"><div class="empty-icon">💼</div><h3 style="margin-bottom:8px">No connections loaded</h3><p>Go to Step 1 and upload your LinkedIn Connections.csv first.</p></div>';
    wrap.appendChild(empty);return wrap;
  }

  // Filters card
  const fc=document.createElement('div');fc.className='card';
  fc.innerHTML='<div class="card-title">Filter Your Connections</div>';

  // Job Title filter
  const tf=document.createElement('div');tf.style.marginBottom='14px';
  tf.innerHTML='<label class="lbl">Filter by Job Title</label>';
  const tagList=document.createElement('div');tagList.className='chip-group';

function applyFilters(){
  S.filtered=S.raw.filter(r=>{
    if(S.filters.titles.length){
      const titleMatch=S.filters.titles.some(t=>r.title&&r.title.toLowerCase().includes(t.toLowerCase()));
      if(!titleMatch)return false;
    }
    if(S.filters.locations.length){
      const locMatch=S.filters.locations.some(l=>r.location&&r.location.toLowerCase().includes(l.toLowerCase()));
      if(!locMatch)return false;
    }
    if(S.filters.companies.length){
      const coMatch=S.filters.companies.some(c=>r.company&&r.company.toLowerCase().includes(c.toLowerCase()));
      if(!coMatch)return false;
    }
    if(S.filters.keywords){
      const kw=S.filters.keywords.toLowerCase();
      if(!((r.title&&r.title.toLowerCase().includes(kw))||(r.company&&r.company.toLowerCase().includes(kw))))return false;
    }
    return true;
  });
}

async function enrichEmails(btn){
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Enriching...';
  const noEmail=S.filtered.filter(r=>!r.email);
  let found=0;
  for(const r of noEmail){
    if(!r.firstName||!r.lastName||!r.company)continue;
    try{
      const resp=await fetch('/.netlify/functions/find-leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'find-email',contact:{firstName:r.firstName,lastName:r.lastName,company:r.company}})});
      const data=await resp.json();
      if(data.email){r.email=data.email;found++;}
    }catch(e){}
    await new Promise(x=>setTimeout(x,300));
  }
  btn.disabled=false;btn.textContent='🔍 Find Missing Emails';
  switchTab('filter',document.querySelectorAll('.tab')[1]);
  if(found)alert('✅ Found '+found+' email addresses!');
  else alert('No additional emails found. Try the Find Leads page for more enrichment options.');
}

async function generateMessages(contacts,btn){
  S.generating=true;S.genProgress=0;S.messages=[];
  switchTab('compose',document.querySelectorAll('.tab')[2]);
  for(let i=0;i<contacts.length;i++){
    const r=contacts[i];
    const name=r.firstName+' '+r.lastName;
    const isConnection=true;
    // Generate email
    let emailResult=null;
    if(S.channel!=='linkedin'){
      try{
        const prompt=buildEmailPrompt(r,isConnection);
        const resp=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,company:r.company,industry:''})});
        const data=await resp.json();
        let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
        const js=txt.indexOf('{');const je=txt.lastIndexOf('}');
        if(js>=0&&je>js)emailResult=JSON.parse(txt.substring(js,je+1));
      }catch(e){}
    }
    // Generate LinkedIn message (always shorter)
    const liMsg=buildLinkedInMessage(r,emailResult);
    S.messages.push({contact:r,email:emailResult,linkedin:liMsg});
    S.genProgress=i+1;
    switchTab('compose',document.querySelectorAll('.tab')[2]);
    await new Promise(x=>setTimeout(x,4000));
  }
  S.generating=false;
  switchTab('compose',document.querySelectorAll('.tab')[2]);
}

function buildEmailPrompt(r,isConnection){
  const angles={connection:'You are connected on LinkedIn which gives you a warm opener.',pain:'Lead with their operational risk.',roi:'Lead with financial impact and savings.',question:'Open with a sharp business question.',insight:'Open with a surprising industry insight.'};
  return`You are an expert B2B sales copywriter. ${angles[S.emailAngle]||angles.connection}

Write a personalized cold email from a LinkedIn connection:
- To: ${r.firstName} ${r.lastName}, ${r.title||'professional'} at ${r.company||'their company'}
- From: ${S.sender.name}, ${S.sender.company}
- Context: You are connected on LinkedIn
- Product: Velorah - AI-Powered Cold Email & Cybersecurity Risk Assessment
- Tone: Warm but professional, reference the LinkedIn connection naturally

Rules: Under 150 words, 3 paragraphs, soft CTA for 15-min call.
JSON only: {"subject":"...","body":"..."}`;
}

function buildLinkedInMessage(r,emailResult){
  const name=r.firstName||'there';
  if(emailResult){
    // Convert email to LinkedIn format (shorter, more casual)
    const body=emailResult.body||'';
    const firstPara=body.split('\n\n')[0]||body.substring(0,100);
    const clean=firstPara.replace(/Dear.*?,\s*/,'').replace(/Hi.*?,\s*/,'').trim();
    return`Hi ${name}, ${clean.substring(0,180)}... Would love to connect on this - open to a quick 15-min chat? -${S.sender.name}`;
  }
  return`Hi ${name}, I noticed your work in ${r.title?'the '+r.title+' space':'your industry'} and thought Velorah's AI risk assessment platform might be relevant to you. Open to a quick 15-min chat? -${S.sender.name}`;
}

      const copyBtn=document.createElement('button');copyBtn.className='btn btn-sm btn-li';copyBtn.style.marginTop='8px';
      copyBtn.textContent='📋 Copy & Open LinkedIn';
      copyBtn.onclick=()=>{
        navigator.clipboard.writeText(m.linkedin).then(()=>{
          if(m.contact.linkedinUrl){window.open(m.contact.linkedinUrl,'_blank');setTimeout(()=>alert('Message copied! Paste it in the LinkedIn message box.'),500);}
          else{alert('Message copied! Now open their LinkedIn profile and paste.');}
        });
      };
      liBox.appendChild(copyBtn);
      msgPanel.appendChild(liBox);
    }

    card.appendChild(msgPanel);
    wrap.appendChild(card);
  });
  return wrap;
}

function exportMessages(){
  const hdrs=['First Name','Last Name','Email','Company','Title','LinkedIn URL','Email Subject','Email Body','LinkedIn Message'];
  const rows=S.messages.map(m=>[m.contact.firstName,m.contact.lastName,m.contact.email||'',m.contact.company||'',m.contact.title||'',m.contact.linkedinUrl||'',m.email?m.email.subject:'',m.email?m.email.body:'',m.linkedin||'']);
  const csv=[hdrs,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='linkedin_campaign_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

async function signOut(){await sbClient.auth.signOut();window.location.href='/login.html';}
init();
</script>

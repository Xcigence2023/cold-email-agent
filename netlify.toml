[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "APP_URL"
  NODE_VERSION = "18"

# ── FUNCTION TIMEOUTS ─────────────────────────────────────
[functions."generate"]
  timeout = 26

[functions."send-bulk"]
  timeout = 26

[functions."find-leads"]
  timeout = 26

[functions."visitor-track"]
  timeout = 26

[functions."analyze-leads"]
  timeout = 26

[functions."social-listen"]
  timeout = 26

# ── GLOBAL SECURITY HEADERS ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── HTML PAGE HEADERS ─────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.anthropic.com https://api.sendgrid.com https://api.apollo.io https://api.hunter.io https://api.lusha.com https://www.reddit.com https://hn.algolia.com https://www.googleapis.com https://api.stackexchange.com https://dev.to https://api.github.com https://api.search.brave.com https://ipinfo.io;"

# ── JS FILES CACHE ────────────────────────────────────────
[[headers]]
  for = "/velorah-tracker.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── NETLIFY FUNCTION HEADERS ──────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

# ── REDIRECTS ─────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

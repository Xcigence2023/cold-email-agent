[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "APP_URL,SUPABASE_URL,TWILIO_PHONE_NUMBER,TWILIO_TWIML_APP_SID"
  NODE_VERSION = "18"

# ── FUNCTION TIMEOUTS ─────────────────────────────────────
[functions."generate"]
  timeout = 26

[functions."send-bulk"]
  timeout = 26

[functions."find-leads"]
  timeout = 26

[functions."visitor-track"]
  timeout = 26

[functions."analyze-leads"]
  timeout = 26

[functions."social-listen"]
  timeout = 26

[functions."video_agent"]
  timeout = 26

[functions."twilio-token"]
  timeout = 10

[functions."twilio-voice"]
  timeout = 10

[functions."ai-visibility"]
  timeout = 20

# ── GLOBAL SECURITY HEADERS ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── HTML PAGE HEADERS ─────────────────────────────────────
# Updated CSP: allows jsdelivr (Supabase SDK + sourcemaps) and all required services
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://sdk.twilio.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; media-src 'self' blob: https:; connect-src 'self' https://*.supabase.co https://api.anthropic.com https://api.sendgrid.com https://api.apollo.io https://api.hunter.io https://api.lusha.com https://www.reddit.com https://hn.algolia.com https://www.googleapis.com https://api.stackexchange.com https://dev.to https://api.github.com https://api.search.brave.com https://ipinfo.io https://image.pollinations.ai https://api.d-id.com https://api-inference.huggingface.co https://*.hf.space https://huggingface.co https://cdn.jsdelivr.net https://sdk.twilio.com https://eventgw.twilio.com wss://chunderw-vpc-gll.twilio.com wss://*.twilio.com https://*.twilio.com; worker-src blob:; frame-src 'none';"

# ── STATIC ASSET CACHE ────────────────────────────────────
[[headers]]
  for = "/velorah-tracker.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── REDIRECTS ─────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/app.html"
  status = 302

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "APP_URL"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 26

[functions."send-bulk"]
  timeout = 26

[functions."find-leads"]
  timeout = 26

[functions."visitor-track"]
  timeout = 26

[functions."analyze-leads"]
  timeout = 26

[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

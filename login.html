<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#070c18"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Velorah — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c18;--bg2:#0d1526;--bg3:#111e35;
  --text:#e8f0fe;--text2:#7b91b4;--text3:#4a5f80;
  --blue:#3b82f6;--blue-dim:#1e3a6e;--blue-glow:rgba(59,130,246,.25);
  --cyan:#06b6d4;--green:#10b981;--red:#ef4444;
  --border:rgba(59,130,246,.15);--border2:rgba(59,130,246,.3);
  --glass:rgba(255,255,255,.03);--r:10px;--rl:16px;
}
body{
  font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);
  background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  position:relative;overflow:hidden;
}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 60% at 15% 10%,rgba(59,130,246,.1) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 85% 90%,rgba(6,182,212,.08) 0%,transparent 60%);
  pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:
  linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}
.card{
  position:relative;z-index:1;
  background:rgba(13,21,38,.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--rl);
  padding:2.5rem;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 80px rgba(59,130,246,.05);
}
.logo{text-align:center;margin-bottom:2rem}
.logo-mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;box-shadow:0 0 30px rgba(59,130,246,.4)}
.logo h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:13px;color:var(--text2);margin-top:4px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;letter-spacing:.02em}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--text)}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);background:rgba(7,12,24,.8);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
input::placeholder{color:var(--text3)}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-top:6px;letter-spacing:.02em}
.btn-primary{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.35)}
.btn-primary:hover{box-shadow:0 4px 25px rgba(59,130,246,.55);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.forgot{text-align:right;margin-top:-8px;margin-bottom:10px}
.forgot a{font-size:12px;color:var(--blue);text-decoration:none}
.msg{font-size:12px;padding:10px 14px;border-radius:var(--r);margin-top:12px;display:none;line-height:1.5}
.msg.error{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25);display:block}
.msg.success{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);display:block}
.footer-note{text-align:center;font-size:12px;color:var(--text3);margin-top:1.5rem;line-height:1.6}
.footer-note a{color:var(--blue);text-decoration:none}
.free-badge{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(59,130,246,.1);color:var(--blue);border:1px solid var(--border2)}
.back-link{text-align:center;margin-top:14px}
.back-link a{font-size:13px;color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">✉</div>
    <h1>Velorah</h1>
    <p>AI-Powered Cold Email Agent for B2B Sales</p>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="form-group"><label>Email Address</label><input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/></div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password"/>
    </div>
    <div class="forgot"><a href="#" onclick="showForgot();return false">Forgot password?</a></div>
    <button class="btn btn-primary" id="btn-login" onclick="login()">Sign In</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP -->
  <div id="form-signup" style="display:none">
    <div class="form-group"><label>Full Name</label><input type="text" id="signup-name" placeholder="Alex Rivera" autocomplete="name"/></div>
    <div class="form-group"><label>Work Email</label><input type="email" id="signup-email" placeholder="you@company.com" autocomplete="email"/></div>
    <div class="form-group"><label>Password (min 8 chars)</label><input type="password" id="signup-password" placeholder="Min 8 characters" autocomplete="new-password"/></div>
    <div class="form-group"><label>Company</label><input type="text" id="signup-company" placeholder="Your company"/></div>
    <button class="btn btn-primary" id="btn-signup" onclick="signup()">Create Free Account</button>
    <div class="msg" id="signup-msg"></div>
    <div style="text-align:center;margin-top:12px"><span class="free-badge">Free: 50 leads/month · No credit card required</span></div>
  </div>

  <!-- FORGOT -->
  <div id="form-forgot" style="display:none">
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Enter your email and we'll send you a reset link.</p>
    <div class="form-group"><label>Email Address</label><input type="email" id="forgot-email" placeholder="you@company.com"/></div>
    <button class="btn btn-primary" onclick="resetPassword()">Send Reset Link</button>
    <div class="msg" id="forgot-msg"></div>
    <div class="back-link"><a href="#" onclick="switchTab('login');return false">← Back to Sign In</a></div>
  </div>

  <div class="footer-note">By signing in you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a></div>
</div>

<script>
const SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
const sbClient=window.supabase.createClient(SB_URL,SB_KEY);

(async()=>{
  try{const{data:{session}}=await sbClient.auth.getSession();if(session)window.location.href='/app.html';}
  catch(e){console.warn(e);}
})();

function switchTab(t){
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-signup').style.display=t==='signup'?'block':'none';
  document.getElementById('form-forgot').style.display='none';
  document.getElementById('tab-login').className='tab'+(t==='login'?' active':'');
  document.getElementById('tab-signup').className='tab'+(t==='signup'?' active':'');
}
function showForgot(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-forgot').style.display='block';
}
function showMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type;}

async function login(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  if(!email||!pw)return showMsg('login-msg','Please enter email and password.','error');
  const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Signing in...';
  try{
    const{error}=await sbClient.auth.signInWithPassword({email,password:pw});
    if(error){showMsg('login-msg',error.message,'error');btn.disabled=false;btn.textContent='Sign In';}
    else window.location.href='/app.html';
  }catch(e){showMsg('login-msg',e.message,'error');btn.disabled=false;btn.textContent='Sign In';}
}

async function signup(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pw=document.getElementById('signup-password').value;
  const co=document.getElementById('signup-company').value.trim();
  if(!name||!email||!pw)return showMsg('signup-msg','Please fill in all required fields.','error');
  if(pw.length<8)return showMsg('signup-msg','Password must be at least 8 characters.','error');
  const btn=document.getElementById('btn-signup');btn.disabled=true;btn.textContent='Creating account...';
  try{
    const{data,error}=await sbClient.auth.signUp({email,password:pw,options:{data:{full_name:name,company:co}}});
    if(error){showMsg('signup-msg',error.message,'error');}
    else if(data.user&&!data.session){showMsg('signup-msg','Check your email for a confirmation link!','success');btn.textContent='Check your email ✓';}
    else window.location.href='/app.html';
  }catch(e){showMsg('signup-msg',e.message,'error');}
  if(btn.textContent==='Creating account...')btn.disabled=false;btn.textContent=btn.disabled?btn.textContent:'Create Free Account';
}

async function resetPassword(){
  const email=document.getElementById('forgot-email').value.trim();
  if(!email)return showMsg('forgot-msg','Please enter your email.','error');
  try{
    const{error}=await sbClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/app.html'});
    if(error)showMsg('forgot-msg',error.message,'error');
    else showMsg('forgot-msg','Reset link sent! Check your inbox.','success');
  }catch(e){showMsg('forgot-msg',e.message,'error');}
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const lv=document.getElementById('form-login').style.display!=='none';
  const sv=document.getElementById('form-signup').style.display!=='none';
  if(lv)login();else if(sv)signup();
});
</script>
</body>
</html>

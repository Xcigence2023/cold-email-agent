<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Velorah — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ec;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:16px;border:1px solid #e0e0d8;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:24px;font-weight:700;color:#1a1a1a}
.logo p{font-size:13px;color:#6b6b6b;margin-top:4px}
.tabs{display:flex;border-bottom:1px solid #e0e0d8;margin-bottom:1.5rem}
.tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:500;cursor:pointer;color:#6b6b6b;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#6b6b6b;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #c8c8c0;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;transition:border-color .15s}
input:focus{outline:none;border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-primary:hover{background:#1e40af}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.forgot{text-align:right;margin-top:-8px;margin-bottom:10px}
.forgot a{font-size:12px;color:#1d4ed8;text-decoration:none}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:14px;display:none}
.msg.error{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;display:block}
.msg.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;display:block}
.footer-note{text-align:center;font-size:12px;color:#9b9b9b;margin-top:1.5rem}
.footer-note a{color:#1d4ed8;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>✉️ Velorah</h1>
    <p>AI-Powered Cold Email Agent for B2B Sales</p>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
  </div>
  <div id="form-login">
    <div class="form-group"><label>Email Address</label><input type="email" id="login-email" placeholder="you@company.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="Your password"/></div>
    <div class="forgot"><a href="#" onclick="showForgot();return false">Forgot password?</a></div>
    <button class="btn btn-primary" id="btn-login" onclick="login()">Sign In</button>
    <div class="msg" id="login-msg"></div>
  </div>
  <div id="form-signup" style="display:none">
    <div class="form-group"><label>Full Name</label><input type="text" id="signup-name" placeholder="Alex Rivera"/></div>
    <div class="form-group"><label>Work Email</label><input type="email" id="signup-email" placeholder="you@company.com"/></div>
    <div class="form-group"><label>Password (min 8 chars)</label><input type="password" id="signup-password" placeholder="Min 8 characters"/></div>
    <div class="form-group"><label>Company</label><input type="text" id="signup-company" placeholder="Your company"/></div>
    <button class="btn btn-primary" id="btn-signup" onclick="signup()">Create Free Account</button>
    <div class="msg" id="signup-msg"></div>
    <p style="font-size:11px;color:#9b9b9b;margin-top:12px;text-align:center">Free: 50 leads/month. No credit card required.</p>
  </div>
  <div id="form-forgot" style="display:none">
    <p style="font-size:13px;color:#6b6b6b;margin-bottom:14px">Enter your email to receive a reset link.</p>
    <div class="form-group"><label>Email Address</label><input type="email" id="forgot-email" placeholder="you@company.com"/></div>
    <button class="btn btn-primary" onclick="resetPassword()">Send Reset Link</button>
    <div class="msg" id="forgot-msg"></div>
    <div style="text-align:center;margin-top:14px"><a href="#" onclick="switchTab('login');return false" style="font-size:13px;color:#1d4ed8">Back to Sign In</a></div>
  </div>
  <div class="footer-note">By signing in you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a></div>
</div>
<script>
const SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
const sbClient=window.supabase.createClient(SB_URL,SB_KEY);
(async()=>{try{const{data:{session}}=await sbClient.auth.getSession();if(session)window.location.href='/app.html';}catch(e){console.warn(e);}})();
function switchTab(t){
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-signup').style.display=t==='signup'?'block':'none';
  document.getElementById('form-forgot').style.display='none';
  document.getElementById('tab-login').className='tab'+(t==='login'?' active':'');
  document.getElementById('tab-signup').className='tab'+(t==='signup'?' active':'');
}
function showForgot(){document.getElementById('form-login').style.display='none';document.getElementById('form-forgot').style.display='block';}
function showMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type;}
async function login(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  if(!email||!pw)return showMsg('login-msg','Please enter email and password.','error');
  const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Signing in...';
  try{const{error}=await sbClient.auth.signInWithPassword({email,password:pw});
    if(error)showMsg('login-msg',error.message,'error');
    else window.location.href='/app.html';
  }catch(e){showMsg('login-msg',e.message,'error');}
  btn.disabled=false;btn.textContent='Sign In';
}
async function signup(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pw=document.getElementById('signup-password').value;
  const co=document.getElementById('signup-company').value.trim();
  if(!name||!email||!pw)return showMsg('signup-msg','Please fill all required fields.','error');
  if(pw.length<8)return showMsg('signup-msg','Password must be at least 8 characters.','error');
  const btn=document.getElementById('btn-signup');btn.disabled=true;btn.textContent='Creating...';
  try{const{data,error}=await sbClient.auth.signUp({email,password:pw,options:{data:{full_name:name,company:co}}});
    if(error)showMsg('signup-msg',error.message,'error');
    else if(data.user&&!data.session)showMsg('signup-msg','Check your email for a confirmation link!','success');
    else window.location.href='/app.html';
  }catch(e){showMsg('signup-msg',e.message,'error');}
  btn.disabled=false;btn.textContent='Create Free Account';
}
async function resetPassword(){
  const email=document.getElementById('forgot-email').value.trim();
  if(!email)return showMsg('forgot-msg','Please enter your email.','error');
  try{const{error}=await sbClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/app.html'});
    if(error)showMsg('forgot-msg',error.message,'error');
    else showMsg('forgot-msg','Reset link sent! Check your inbox.','success');
  }catch(e){showMsg('forgot-msg',e.message,'error');}
}
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;const lv=document.getElementById('form-login').style.display!=='none';const sv=document.getElementById('form-signup').style.display!=='none';if(lv)login();else if(sv)signup();});
</script>
</body>
</html>

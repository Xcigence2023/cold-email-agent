<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Xcigence — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ec;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:16px;border:1px solid #e0e0d8;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:22px;font-weight:700;color:#1a1a1a}
.logo p{font-size:13px;color:#6b6b6b;margin-top:4px}
.tabs{display:flex;border-bottom:1px solid #e0e0d8;margin-bottom:1.5rem}
.tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:500;cursor:pointer;color:#6b6b6b;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#6b6b6b;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #c8c8c0;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;transition:border-color .15s}
input:focus{outline:none;border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-primary:hover{background:#1e40af}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.divider{text-align:center;font-size:12px;color:#9b9b9b;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e0e0d8}
.divider::before{left:0}.divider::after{right:0}
.btn-google{background:#fff;border:1px solid #c8c8c0;color:#1a1a1a;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-google:hover{background:#f7f7f5}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:14px;display:none}
.msg.error{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;display:block}
.msg.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;display:block}
.forgot{text-align:right;margin-top:-8px;margin-bottom:10px}
.forgot a{font-size:12px;color:#1d4ed8;text-decoration:none}
.footer-note{text-align:center;font-size:12px;color:#9b9b9b;margin-top:1.5rem}
.footer-note a{color:#1d4ed8;text-decoration:none}
.plan-badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#eff6ff;color:#1d4ed8;margin-left:6px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🛡️ Xcigence</h1>
    <p>AI Cold Email Agent for Cybersecurity Sales</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password"/>
    </div>
    <div class="forgot"><a href="#" onclick="showForgot()">Forgot password?</a></div>
    <button class="btn btn-primary" onclick="login()" id="btn-login">Sign In</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Alex Rivera" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Work Email</label>
      <input type="email" id="signup-email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 8 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="signup-company" placeholder="Your company"/>
    </div>
    <button class="btn btn-primary" onclick="signup()" id="btn-signup">Create Free Account</button>
    <div class="msg" id="signup-msg"></div>
    <p style="font-size:11px;color:#9b9b9b;margin-top:12px;text-align:center">Free plan includes 50 leads/month. No credit card required.</p>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="form-forgot" style="display:none">
    <p style="font-size:13px;color:#6b6b6b;margin-bottom:14px">Enter your email and we'll send you a reset link.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="you@company.com"/>
    </div>
    <button class="btn btn-primary" onclick="resetPassword()">Send Reset Link</button>
    <div class="msg" id="forgot-msg"></div>
    <div style="text-align:center;margin-top:14px"><a href="#" onclick="switchTab('login')" style="font-size:13px;color:#1d4ed8">← Back to Sign In</a></div>
  </div>

  <div class="footer-note" id="footer-note">
    By signing in you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_r1pXucl5EeEeORtDd6jAeA_bXo15UDa'; // Replace with your anon key
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check if already logged in
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = '/app.html';
})();

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('form-forgot').style.display = 'none';
  document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
  document.getElementById('footer-note').style.display = 'block';
}

function showForgot() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-forgot').style.display = 'block';
  document.getElementById('footer-note').style.display = 'none';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showMsg('login-msg', 'Please enter your email and password.', 'error');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('login-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    window.location.href = '/app.html';
  }
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const company = document.getElementById('signup-company').value.trim();
  if (!name || !email || !password) return showMsg('signup-msg', 'Please fill in all required fields.', 'error');
  if (password.length < 8) return showMsg('signup-msg', 'Password must be at least 8 characters.', 'error');
  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name, company } }
  });
  if (error) {
    showMsg('signup-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Free Account';
  } else if (data.user && !data.session) {
    showMsg('signup-msg', 'Check your email for a confirmation link!', 'success');
    btn.textContent = 'Check your email ✓';
  } else {
    window.location.href = '/app.html';
  }
}

async function resetPassword() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return showMsg('forgot-msg', 'Please enter your email address.', 'error');
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/app.html'
  });
  if (error) showMsg('forgot-msg', error.message, 'error');
  else showMsg('forgot-msg', 'Reset link sent! Check your inbox.', 'success');
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    const signupVisible = document.getElementById('form-signup').style.display !== 'none';
    if (loginVisible) login();
    else if (signupVisible) signup();
  }
});
</script>
</body>
</html>

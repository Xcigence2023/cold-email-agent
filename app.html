<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Velorah — AI Cold Email Agent</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ec;--text:#1a1a1a;--text2:#6b6b6b;--border:#e0e0d8;--border2:#c8c8c0;--blue:#1d4ed8;--blue-bg:#eff6ff;--blue-border:#bfdbfe;--green:#15803d;--green-bg:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-bg:#fff1f2;--red-border:#fecdd3;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f5f5f0;--text2:#aeaeb2;--border:#3a3a3c;--border2:#48484a}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.topbar-brand{font-size:16px;font-weight:700}
.topbar-nav{display:flex;gap:4px}
.topbar-nav a{font-size:13px;font-weight:500;padding:5px 10px;border-radius:6px;text-decoration:none;color:var(--text2);transition:all .15s}
.topbar-nav a:hover{background:var(--bg2);color:var(--text)}
.topbar-nav a.active{background:var(--blue-bg);color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.plan-chip{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.plan-chip.starter{background:var(--blue-bg);color:var(--blue)}
.plan-chip.growth{background:var(--green-bg);color:var(--green)}
.usage-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.usage-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.usage-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.btn-sm{cursor:pointer;font-size:12px;font-weight:500;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text);font-family:inherit}
.btn-sm:hover{background:var(--bg2)}
/* PAGE */
.page{max-width:960px;margin:0 auto;padding:1.5rem}
/* STEP BAR */
.step-bar{display:flex;align-items:center;margin-bottom:1.5rem}
.si{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.si.active{color:var(--text);font-weight:600}
.si.done{color:var(--green)}
.sn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg);flex-shrink:0}
.si.active .sn{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.si.done .sn{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.sdiv{flex:1;height:1px;background:var(--border);margin:0 6px}
/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-top:12px}
.card:first-child{margin-top:0}
/* FORMS */
input,select,textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
textarea{resize:vertical;line-height:1.6}
.lbl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.g2,.g4{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
/* BUTTONS */
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.btn-primary:hover{opacity:.85}
.btn-success{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn-launch{background:var(--blue);color:#fff;border-color:var(--blue);font-size:15px;padding:12px 28px}
.btn-launch:hover{opacity:.9}
/* MISC */
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.tip{font-size:12px;color:var(--text2);padding:10px 14px;background:var(--bg2);border-radius:var(--r);border-left:3px solid var(--blue-border);line-height:1.5;margin-top:8px}
.tip a{color:var(--blue)}
.warn{font-size:12px;padding:10px 14px;background:#fff7ed;border-radius:var(--r);border-left:3px solid #fed7aa;color:#c2410c;margin-top:8px}
.sec{font-size:15px;font-weight:700;margin-bottom:12px}
.pbar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px}
.pfill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
/* STAT */
.stat-card{background:var(--bg2);border-radius:var(--r);padding:12px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}
/* DROP ZONE */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:var(--blue-bg)}
/* EMAIL PANEL */
.email-panel{display:grid;grid-template-columns:260px 1fr;gap:1rem;align-items:start}
@media(max-width:700px){.email-panel{grid-template-columns:1fr}}
.lead-list{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ll-hdr{padding:8px 12px;font-size:12px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2)}
.ll-body{max-height:480px;overflow-y:auto}
.lr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.lr:hover{background:var(--bg2)}
.lr.active{background:var(--blue-bg)}
.la{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bg3);color:var(--text2)}
.lr.active .la{background:var(--bg);color:var(--blue)}
.email-detail{border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;display:flex;flex-direction:column;gap:12px}
/* ANGLE CARDS */
.angle-card{padding:11px 12px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:var(--bg);transition:all .15s}
.angle-card:hover{border-color:var(--blue-border)}
.angle-card.active{border:2px solid var(--blue);background:var(--blue-bg)}
/* SEND ROW */
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);gap:8px;margin-bottom:6px}
/* TOGGLE */
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.toggle{width:48px;height:26px;border-radius:13px;cursor:pointer;position:relative;display:flex;align-items:center;padding:3px;transition:background .2s}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:white;transition:transform .2s}
</style>
</head>
<body>

<!-- TOP BAR (hidden until auth) -->
<div id="topbar" style="display:none" class="topbar">
  <div class="flex">
    <span class="topbar-brand">✉️ Velorah</span>
    <nav class="topbar-nav">
      <a href="/app.html" class="active">🚀 Campaigns</a>
      <a href="/find-leads.html">🔍 Find Leads</a>
      <a href="/history.html">📋 History</a>

  </div>

    <div class="usage-wrap">

<div class="page">
  <div class="card" style="margin-bottom:1rem;background:linear-gradient(135deg,#eff6ff,#f0fdf4)">
    <h1 style="font-size:18px;font-weight:700;margin-bottom:4px">✉️ Velorah — AI Cold Email Agent</h1>
    <p style="font-size:13px;color:var(--text2)">Upload leads → AI researches & personalizes → Review → Send</p>
  </div>
  <div id="root"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────
const SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
const sbClient=window.supabase.createClient(SB_URL,SB_KEY);
let _session=null;
const emailRx=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// ── STATE ─────────────────────────────────────────────────
const S={
  step:0,leads:[],headers:[],
  colMap:{email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:'',companySize:'',revenue:''},
  sender:{name:'',email:'',title:'',company:'Velorah'},
  emails:[],genProgress:0,activeIdx:0,
  sendStatus:{},trackingStatus:{},messageIds:{},
  dragOver:false,emailAngle:'pain',researchMode:false,
  attachments:[],scheduleAt:null,campaignName:'',
  bulkSending:false,bulkProgress:{total:0,sent:0,failed:0}
};

// ── CSV ───────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  const pr=line=>{const r=[];let c='';let q=false;for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;};
  const headers=pr(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=pr(l);const o={};headers.forEach((h,i)=>o[h]=v[i]||'');return o;});
  return{headers,rows};
}
function autoMap(headers){
  const map={email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:'',companySize:'',revenue:''};
  const v={email:['email','e-mail','mail'],fullName:['full name','fullname','name','contact name'],firstName:['first name','firstname','first'],lastName:['last name','lastname','surname'],company:['company','organization','org','account'],title:['title','job title','position','role'],industry:['industry','sector','vertical'],companySize:['company size','size','employees','headcount'],revenue:['revenue','annual revenue','arr']};
  headers.forEach(h=>{const hl=h.toLowerCase().trim();Object.entries(v).forEach(([k,vs])=>{if(!map[k]&&vs.some(vv=>hl===vv||hl.includes(vv)))map[k]=h;});});
  return map;
}
function getName(lead){return(lead[S.colMap.fullName]||((lead[S.colMap.firstName]||'')+' '+(lead[S.colMap.lastName]||'')).trim()||lead[S.colMap.email]||'Unknown').trim();}

// ── AI PROMPT ─────────────────────────────────────────────
function getSystem(angle,sz,rev){
  const angles={
    pain:'EMAIL ANGLE: PAIN-FOCUSED. Open by naming their most pressing business risk - cyberattack crippling operations, breach destroying trust, or compliance failure. Never default to SOC 2 unless SaaS/tech.',
    roi:'EMAIL ANGLE: ROI-FOCUSED. Lead with financial reality - average breach costs $4.88M, ransomware causes 22 days downtime. Show how Velorah protects the balance sheet.',
    risk:'EMAIL ANGLE: RISK-FOCUSED. Open with real consequences - operational shutdown, stock price collapse, customer churn, executive liability. Frame as business survival.',
    proof:'EMAIL ANGLE: SOCIAL PROOF. Reference how similar companies avoided breaches. Focus on business outcomes - revenue protected, operations kept running.',
    question:'EMAIL ANGLE: QUESTION-BASED. Open with one sharp business question - not technical. Make it visceral and real before connecting to Velorah.',
    insight:'EMAIL ANGLE: INSIGHT-LED. Open with a surprising business insight - how a recent breach wiped out market cap or caused customer exodus.'
  };
  const sizeGuide=sz?'\n\nCOMPANY SIZE: '+sz+' employees'+(rev?' Revenue: '+rev:'')+'.\n- Under 50: survival framing, lean teams\n- 50-500: operational disruption, growing compliance burden\n- 500-5000: board accountability, $4.88M breach cost stats\n- 5000+: market cap impact, SEC disclosure, class action risk\n- NEVER apply SMB survival stats to large enterprises.':'';
  return `You are an expert B2B sales copywriter. Write emails that land in the inbox, not spam.

${angles[angle]||angles.pain}

PRODUCT: Velorah - AI-Powered Cold Email & Cybersecurity Risk Assessment Platform
FEATURES: Automated risk scores, 12+ compliance frameworks (SOC 2, HIPAA, GDPR, PCI DSS, ISO 27001, NIST, CCPA, FedRAMP, DORA, PIPEDA), AI remediation roadmaps, 60-70% cost reduction vs manual audits.

FRAMEWORK BY INDUSTRY (never default to SOC 2 unless tech/SaaS):
Healthcare: HIPAA, HITECH | Finance: PCI DSS, SOX, DORA | Government: FedRAMP, FISMA | Retail: PCI DSS, CCPA | Manufacturing: NIST CSF, IEC 62443 | Legal: ISO 27001, GDPR${sizeGuide}

RULES:
- Never open with "I hope this finds you well"
- Subject: under 50 chars, no spam words, outcome-focused
- Body: 3 short paragraphs, conversational peer-to-peer tone
- One concrete stat or number
- Soft CTA: offer 15-min call
- End with: "If you'd prefer not to hear from me, just reply and I'll remove you."
- Under 175 words total

Respond ONLY with valid JSON, no markdown: {"subject":"...","body":"..."}`;
}

// ── API CALLS ─────────────────────────────────────────────
async function callAI(lead){
  const name=getName(lead);
  const company=lead[S.colMap.company]||'your company';
  const title=lead[S.colMap.title]||'decision maker';
  const industry=lead[S.colMap.industry]||'technology';
  const sz=lead[S.colMap.companySize]||'';
  const rev=lead[S.colMap.revenue]||'';
  const prompt=getSystem(S.emailAngle,sz,rev)+'\n\nWrite a cold email to:\n- Name: '+name+'\n- Title: '+title+'\n- Company: '+company+'\n- Industry: '+industry+'\n- From: '+S.sender.name+', '+(S.sender.title||'Account Executive')+', '+S.sender.company+'\n\nRespond ONLY with valid JSON, no markdown: {"subject":"...","body":"..."}';
  const resp=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,company,industry,companySize:sz,revenue:rev,researchMode:S.researchMode})});
  const txt=await resp.text();
  if(!resp.ok){let e='HTTP '+resp.status;try{const d=JSON.parse(txt);e=d.error||e;}catch(ex){}throw new Error(e);}
  const data=JSON.parse(txt);
  const blocks=data.content||[];
  let out='';for(const b of blocks){if(b.type==='text')out+=b.text;}
  out=out.replace(/```json|```/g,'').trim();
  const js=out.indexOf('{');const je=out.lastIndexOf('}');
  if(js<0||je<0)throw new Error('Could not parse AI response');
  return JSON.parse(out.substring(js,je+1));
}

async function sendEmail(to,subject,body){
  const resp=await fetch('/.netlify/functions/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,subject,body,fromEmail:S.sender.email,fromName:S.sender.name,attachments:S.attachments})});
  const data=await resp.json();
  return{success:data.success===true,messageId:data.messageId||null};
}

// ── DOM HELPERS ───────────────────────────────────────────
function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  kids.flat().forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

function draw(){
  const root=document.getElementById('root');
  if(!root)return;
  root.innerHTML='';
  root.appendChild(stepBar());
  const steps=[p0,p1,p2,p3,p4];
  if(steps[S.step])root.appendChild(steps[S.step]());
}

function stepBar(){
  const names=['Upload Leads','Configure','Generate','Review & Edit','Send Campaign'];
  const bar=h('div',{style:{display:'flex',alignItems:'center',marginBottom:'1.25rem'}});
  names.forEach((s,i)=>{
    const cls='si'+(i===S.step?' active':i<S.step?' done':'');
    bar.appendChild(h('div',{cls},h('div',{cls:'sn'},i<S.step?'✓':String(i+1)),h('span',null,s)));
    if(i<names.length-1)bar.appendChild(h('div',{cls:'sdiv'}));
  });
  return bar;
}

// ── STEP 0: UPLOAD ────────────────────────────────────────
function p0(){
  const wrap=h('div',null);
  wrap.appendChild(h('div',{cls:'card'},
    h('h2',{style:{fontSize:'16px',fontWeight:'700',marginBottom:'4px'}},'Upload your lead list'),
    h('p',{style:{fontSize:'13px',color:'var(--text2)'}},'Upload a CSV file. Required: Email, Company. Optional: Name, Title, Industry, Company Size.')
  ));
  let fi;
  const dz=h('div',{cls:'drop-zone'+(S.dragOver?' over':''),style:{marginTop:'12px'},
    onClick:()=>fi.click(),
    onDragover:e=>{e.preventDefault();S.dragOver=true;draw();},
    onDragleave:()=>{S.dragOver=false;draw();},
    onDrop:e=>{e.preventDefault();S.dragOver=false;readFile(e.dataTransfer.files[0]);}
  },
    h('div',{style:{fontSize:'32px',marginBottom:'10px'}},'📂'),
    h('p',{style:{fontWeight:'700',marginBottom:'6px'}},'Drop your CSV file here'),
    h('p',{style:{fontSize:'13px',color:'var(--text2)'}},'or click to browse')
  );
  wrap.appendChild(dz);
  fi=document.createElement('input');fi.type='file';fi.accept='.csv';fi.style.display='none';
  fi.addEventListener('change',e=>{if(e.target.files[0])readFile(e.target.files[0]);});
  wrap.appendChild(fi);
  const tip=h('div',{cls:'tip',style:{marginTop:'10px'}});
  tip.innerHTML='<strong>Columns:</strong> First Name, Last Name, Email, Company, Job Title, Industry, Company Size &nbsp;·&nbsp; <a href="#" id="dl-sample">Download sample CSV</a>';
  wrap.appendChild(tip);
  setTimeout(()=>{const a=document.getElementById('dl-sample');if(a)a.onclick=e=>{e.preventDefault();dlSample();};},0);
  if(S.leads.length>0){
    const pv=h('div',{cls:'card'});
    pv.appendChild(h('div',{cls:'fb',style:{marginBottom:'8px'}},h('span',{style:{fontWeight:'700'}},'✓ '+S.leads.length+' leads loaded'),h('span',{cls:'badge',style:{background:'var(--green-bg)',color:'var(--green)'}},S.leads.length+' rows')));
    const sample=S.leads.slice(0,3).map(r=>[getName(r),r[S.colMap.company]||''].filter(Boolean).join(' · ')).join(' | ');
    pv.appendChild(h('p',{style:{fontSize:'12px',color:'var(--text2)'}},(sample||'')+(S.leads.length>3?' ...and '+(S.leads.length-3)+' more':'')));
    pv.appendChild(h('div',{style:{textAlign:'right',marginTop:'12px'}},h('button',{cls:'btn btn-primary',onClick:()=>{S.step=1;draw();}},'Map Columns & Configure →')));
    wrap.appendChild(pv);
  }
  return wrap;
}
function readFile(f){const rd=new FileReader();rd.onload=e=>{const{headers,rows}=parseCSV(e.target.result);S.headers=headers;S.leads=rows;S.colMap=autoMap(headers);draw();};rd.readAsText(f);}
function dlSample(){
  const csv='First Name,Last Name,Email,Company,Job Title,Industry,Company Size\nJohn,Smith,john@acme.com,Acme Financial,CISO,Financial Services,2500\nSarah,Chen,sarah@health.io,HealthTech Inc,Chief Compliance Officer,Healthcare,800\nMike,Johnson,mike@retail.com,RetailCo,VP of IT,Retail,150';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sample_leads.csv';a.click();
}

// ── STEP 1: CONFIGURE ─────────────────────────────────────
function p1(){
  const wrap=h('div',null);

  // Column mapping
  const mc=h('div',{cls:'card'},h('p',{cls:'sec'},'Map your CSV columns'));
  const g=h('div',{cls:'g2'});
  [{k:'email',l:'Email *'},{k:'fullName',l:'Full Name'},{k:'firstName',l:'First Name'},{k:'lastName',l:'Last Name'},{k:'company',l:'Company *'},{k:'title',l:'Job Title'},{k:'industry',l:'Industry'},{k:'companySize',l:'Company Size'},{k:'revenue',l:'Revenue'}].forEach(f=>{
    const d=h('div',null,h('label',{cls:'lbl'},f.l));
    const s=h('select',{onChange:e=>S.colMap[f.k]=e.target.value});
    s.appendChild(h('option',{value:''},'-- not mapped --'));
    S.headers.forEach(hd=>{const o=h('option',{value:hd},hd);if(S.colMap[f.k]===hd)o.selected=true;s.appendChild(o);});

// ── STEP 2: GENERATING ────────────────────────────────────
function p2(){
  const pct=S.leads.length>0?Math.round(S.genProgress/S.leads.length*100):0;
  const latest=S.emails.length>0?S.emails[S.emails.length-1]:null;

async function runGenerate(){
  for(let i=0;i<S.leads.length;i++){
    const lead=S.leads[i];
    try{
      const{subject,body}=await callAI(lead);
      S.emails.push({id:i,lead,subject,body,approved:true,error:false});
    }catch(err){
      const overload=err.message&&(err.message.includes('529')||err.message.includes('overload')||err.message.includes('504'));
      S.emails.push({id:i,lead,subject:overload?'[Overloaded - click Regenerate]':'[Failed - click Regenerate]',body:err.message,approved:false,error:true});
    }
    S.genProgress=i+1;draw();
    await new Promise(r=>setTimeout(r,4000));
  }
  S.step=3;S.activeIdx=0;draw();
}

    else if(st==='sent'){badge.style.background='#fef9c3';badge.style.color='#854d0e';badge.textContent='🟡 Sent';}
    else if(st==='scheduled'){badge.style.background='#f3e8ff';badge.style.color='#7e22ce';badge.textContent='⏰ Scheduled';}
    else if(st==='sending'){badge.appendChild(h('span',{cls:'spin'}));}
    else if(st==='error'){badge.style.background='#fee2e2';badge.style.color='#dc2626';badge.textContent='🔴 Failed';}
    else{badge.style.background='var(--bg2)';badge.style.color='var(--text2)';badge.textContent='⚪ Pending';}
    row.appendChild(badge);lc.appendChild(row);
  });
  wrap.appendChild(lc);return wrap;
}

// ── CAMPAIGN LAUNCH ───────────────────────────────────────
async function launchCampaign(approved){
  S.bulkSending=true;S.bulkProgress={total:approved.length,sent:0,failed:0};draw();
  const emails=approved.map(ed=>({id:ed.id,to:(ed.lead[S.colMap.email]||'').trim(),subject:ed.subject,body:ed.body}));
  try{
    const resp=await fetch('/.netlify/functions/send-bulk',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(_session?_session.access_token:'')},
      body:JSON.stringify({emails,fromEmail:S.sender.email,fromName:S.sender.name,scheduleAt:S.scheduleAt||null,campaignName:S.campaignName||'Campaign'})
    });
    const data=await resp.json();
    if(data.success){
      S.bulkProgress={total:data.total,sent:data.sent,failed:data.failed};
      approved.forEach(ed=>{S.sendStatus[ed.id]=data.messageIds&&data.messageIds[ed.id]?(S.scheduleAt?'scheduled':'sent'):'error';if(data.messageIds&&data.messageIds[ed.id])S.messageIds[ed.id]=data.messageIds[ed.id];});
      try{
        await fetch('/.netlify/functions/email-history',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(_session?_session.access_token:'')},body:JSON.stringify({records:approved.map(ed=>({campaignName:S.campaignName||'Campaign',name:getName(ed.lead),email:(ed.lead[S.colMap.email]||'').trim(),company:ed.lead[S.colMap.company]||'',title:ed.lead[S.colMap.title]||'',industry:ed.lead[S.colMap.industry]||'',subject:ed.subject,body:ed.body,status:S.scheduleAt?'scheduled':'sent',messageId:data.messageIds?data.messageIds[ed.id]||null:null,scheduledAt:S.scheduleAt||null}))})});
      }catch(e){}
      const msg=S.scheduleAt?'✅ '+data.sent+' emails scheduled for '+new Date(S.scheduleAt).toLocaleString():'✅ Campaign launched! '+data.sent+' sent · '+data.failed+' failed';
      alert(msg);
      if(!S.scheduleAt)setTimeout(()=>checkTracking(),30000);
    }else{alert('Campaign failed: '+(data.error||'Unknown error'));}
  }catch(e){alert('Error: '+e.message);}
  S.bulkSending=false;draw();
}

async function checkTracking(){
  const sent=S.emails.filter(e=>S.sendStatus[e.id]==='sent');if(!sent.length)return;
  try{
    const resp=await fetch('/.netlify/functions/check-tracking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails:sent.map(e=>({email:e.lead[S.colMap.email],messageId:S.messageIds[e.id]||''}))})});
    const data=await resp.json();
    if(data.results){Object.entries(data.results).forEach(([email,status])=>{const em=sent.find(e=>e.lead[S.colMap.email]===email);if(em)S.trackingStatus[em.id]=status;});draw();}
  }catch(e){}
}

function doExport(){
  const approved=S.emails.filter(e=>e.approved&&!e.error);if(!approved.length){alert('No approved emails to export.');return;}
  const hdrs=['To Name','To Email','Company','Title','Industry','Subject','Body'];
  const csv=[hdrs,...approved.map(e=>[getName(e.lead),e.lead[S.colMap.email]||'',e.lead[S.colMap.company]||'',e.lead[S.colMap.title]||'',e.lead[S.colMap.industry]||'',e.subject,e.body])].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='emails.csv';a.click();
}

// ── AUTH ──────────────────────────────────────────────────
async function initAuth(){
  draw();
  try{
    const{data:{session}}=await sbClient.auth.getSession();
    if(!session){window.location.href='/login.html';return;}
    _session=session;
    document.getElementById('topbar').style.display='flex';
    document.getElementById('user-email').textContent=session.user.email;
    try{
      const resp=await fetch('/.netlify/functions/check-plan',{headers:{'Authorization':'Bearer '+session.access_token}});
      const plan=await resp.json();
      const chip=document.getElementById('plan-chip');
      chip.textContent=plan.plan.charAt(0).toUpperCase()+plan.plan.slice(1);
      chip.className='plan-chip '+(plan.plan!=='free'?plan.plan:'');
      const lim=plan.limit===-1?'Unlim':plan.limit;
      document.getElementById('usage-text').textContent=plan.used+' / '+lim;
      document.getElementById('usage-fill').style.width=(plan.limit===-1?0:Math.min(100,(plan.used/plan.limit)*100))+'%';
    }catch(e){}
    try{
      const resp=await fetch('/.netlify/functions/user-keys',{headers:{'Authorization':'Bearer '+session.access_token}});
      const{keys}=await resp.json();
      if(keys){S.sender.name=keys.sender_name||'';S.sender.email=keys.sender_email||'';S.sender.title=keys.sender_title||'';S.sender.company=keys.sender_company||'Velorah';_session._sendgridKey=keys.sendgrid_key||'';}
    }catch(e){}
    draw();
    // Check for leads imported from find-leads page
    try{const csv=sessionStorage.getItem('velorah_leads_csv');const count=sessionStorage.getItem('velorah_leads_count');if(csv&&count){sessionStorage.removeItem('velorah_leads_csv');sessionStorage.removeItem('velorah_leads_count');const{headers,rows}=parseCSV(csv);S.headers=headers;S.leads=rows;S.colMap=autoMap(headers);S.step=1;draw();const b=document.createElement('div');b.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#15803d;color:white;padding:12px 24px;border-radius:8px;font-weight:700;z-index:9999;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2)';b.textContent='✅ '+count+' leads imported!';document.body.appendChild(b);setTimeout(()=>b.remove(),4000);}}catch(e){}
  }catch(e){
    console.warn('Auth error:',e.message);
    const w=document.createElement('div');w.style.cssText='background:#fff7ed;border-bottom:1px solid #fed7aa;padding:10px 1.5rem;font-size:13px;color:#c2410c;text-align:center';w.innerHTML='Connection issue. <a href="/login.html" style="color:#c2410c;font-weight:700">Sign in</a> or <a href="javascript:location.reload()" style="color:#c2410c;font-weight:700">retry</a>';document.body.insertBefore(w,document.querySelector('.page'));
  }
}

async function saveUserKeys(){
  if(!_session||!_session.access_token)return;
  try{await fetch('/.netlify/functions/user-keys',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_session.access_token},body:JSON.stringify({sendgrid_key:_session._sendgridKey||'',sender_name:S.sender.name,sender_email:S.sender.email,sender_title:S.sender.title,sender_company:S.sender.company})});}catch(e){}
}

async function signOut(){await sbClient.auth.signOut();window.location.href='/login.html';}

initAuth();
</script>

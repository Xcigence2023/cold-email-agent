<html lang="en">
<head>

<title>Velorah — AI Cold Email Agent</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c18;--bg2:#0d1526;--bg3:#111e35;--bg4:#162240;
  --text:#e8f0fe;--text2:#7b91b4;--text3:#4a5f80;
  --blue:#3b82f6;--blue-dim:#1e3a6e;--blue-glow:rgba(59,130,246,.2);
  --cyan:#06b6d4;--cyan-dim:#0e4a5a;
  --green:#10b981;--green-dim:#0a3528;
  --red:#ef4444;--red-dim:#3b1010;
  --gold:#f59e0b;--purple:#8b5cf6;
  --border:rgba(59,130,246,.15);--border2:rgba(59,130,246,.3);
  --r:10px;--rl:14px;--rx:20px;
  --glass:rgba(255,255,255,.03);
  --glass2:rgba(59,130,246,.06);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --glow:0 0 20px rgba(59,130,246,.25);
}
body{font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}

/* BACKGROUND */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 20% 0%,rgba(59,130,246,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 100%,rgba(6,182,212,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:
  linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(7,12,24,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:var(--glow)}
.brand-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,#e8f0fe,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:2px;margin-left:12px}
.nav a{font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px;text-decoration:none;color:var(--text2);transition:all .2s;letter-spacing:.01em}
.nav a:hover{color:var(--text);background:var(--glass2)}
.nav a.active{color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px}
.user-email{font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace}
.plan-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim)}
.usage-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.usage-bar{width:64px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.usage-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .4s}
.btn-sm{cursor:pointer;font-size:12px;font-weight:600;padding:5px 12px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text2);font-family:'Outfit',sans-serif;transition:all .2s}
.btn-sm:hover{border-color:var(--border2);color:var(--text);background:var(--glass2)}

/* PAGE LAYOUT */
.page{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:1.5rem}
.hero{padding:1.5rem;border-radius:var(--rx);background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.05));border:1px solid var(--border);margin-bottom:1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(59,130,246,.1),transparent 70%);pointer-events:none}
.hero h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero p{font-size:13px;color:var(--text2)}

/* STEP BAR */
.step-bar{display:flex;align-items:center;margin-bottom:1.5rem;padding:1rem 1.25rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--rl)}
.si{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.02em;white-space:nowrap}
.si.active{color:var(--blue)}
.si.done{color:var(--green)}
.sn{width:24px;height:24px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s}
.si.active .sn{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(59,130,246,.5)}
.si.done .sn{background:var(--green);border-color:var(--green);color:#fff}
.sdiv{flex:1;height:1px;background:linear-gradient(90deg,var(--border),var(--border));margin:0 8px;min-width:20px}
.si.done+.sdiv{background:linear-gradient(90deg,var(--green),var(--border))}

/* CARDS */
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:16px;background:linear-gradient(var(--blue),var(--cyan));border-radius:2px}

/* FORMS */
.lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
input,select,textarea{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:rgba(13,21,38,.8);color:var(--text);font-family:'Outfit',sans-serif;transition:all .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow),0 0 12px var(--blue-glow)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg2);color:var(--text)}
textarea{resize:vertical;line-height:1.6;min-height:160px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.g2,.g4{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:0}

/* BUTTONS */
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:9px 18px;border:1px solid var(--border);border-radius:var(--r);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s;letter-spacing:.01em}
.btn:hover{border-color:var(--border2);background:var(--glass2)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--blue),#2563eb);border-color:var(--blue);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(59,130,246,.5);transform:translateY(-1px)}
.btn-launch{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:#fff;font-size:15px;font-weight:800;padding:14px 32px;border-radius:var(--rl);box-shadow:0 4px 20px rgba(59,130,246,.4),0 0 40px rgba(6,182,212,.15);letter-spacing:.02em}
.btn-launch:hover{box-shadow:0 8px 30px rgba(59,130,246,.6),0 0 60px rgba(6,182,212,.2);transform:translateY(-2px)}
.btn-success{background:linear-gradient(135deg,var(--green),#059669);border-color:var(--green);color:#fff}
.btn-danger{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--blue)}
.btn-outline:hover{background:var(--blue-dim)}

/* MISC */
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.02em}
.tip{font-size:12px;color:var(--text2);padding:10px 14px;background:rgba(59,130,246,.06);border-radius:var(--r);border-left:3px solid var(--blue-dim);line-height:1.6;margin-top:8px}
.tip a{color:var(--blue);text-decoration:none}
.warn{font-size:12px;padding:10px 14px;background:rgba(245,158,11,.08);border-radius:var(--r);border-left:3px solid var(--gold);color:var(--gold);margin-top:8px;line-height:1.5}
.pbar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;transition:width .4s}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* STAT CARDS */
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;text-align:center;transition:all .2s;cursor:default}
.stat-card:hover{border-color:var(--border2);background:var(--glass2);transform:translateY(-2px);box-shadow:var(--glow)}
.stat-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;font-family:'IBM Plex Mono',monospace}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.04em;text-transform:uppercase}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:var(--rx);padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .3s;background:var(--glass);position:relative;overflow:hidden}
.drop-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(59,130,246,.05),transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s}
.drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:rgba(59,130,246,.05);box-shadow:inset 0 0 40px rgba(59,130,246,.08)}
.drop-zone:hover::before,.drop-zone.over::before{opacity:1}
.drop-icon{font-size:42px;margin-bottom:14px;display:block;filter:drop-shadow(0 0 10px rgba(59,130,246,.4))}

/* EMAIL REVIEW PANEL */
.email-panel{display:grid;grid-template-columns:260px 1fr;gap:1rem;align-items:start}
@media(max-width:720px){.email-panel{grid-template-columns:1fr}}
.lead-list{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ll-hdr{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:rgba(13,21,38,.5);letter-spacing:.05em;text-transform:uppercase}
.ll-body{max-height:500px;overflow-y:auto}
.ll-body::-webkit-scrollbar{width:4px}
.ll-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.lr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all .15s}
.lr:hover{background:var(--glass2)}
.lr.active{background:rgba(59,130,246,.1);border-left:2px solid var(--blue)}
.la{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.lr.active .la{background:var(--blue-dim);color:var(--blue);border-color:var(--blue)}
.email-detail{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;display:flex;flex-direction:column;gap:14px}

/* ANGLE CARDS */
.angle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.angle-card{padding:12px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:var(--glass);transition:all .2s}
.angle-card:hover{border-color:var(--border2);background:var(--glass2)}
.angle-card.active{border-color:var(--blue);background:rgba(59,130,246,.1);box-shadow:0 0 20px rgba(59,130,246,.15)}
.angle-emoji{font-size:18px;margin-bottom:4px}
.angle-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.angle-desc{font-size:11px;color:var(--text2);line-height:1.4}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;display:flex;align-items:center;padding:2px;transition:background .25s;border:1px solid var(--border)}
.toggle.on{background:linear-gradient(135deg,var(--blue),var(--cyan));border-color:var(--blue);box-shadow:0 0 10px rgba(59,130,246,.4)}
.toggle.off{background:var(--bg3)}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.toggle.on .toggle-knob{transform:translateX(20px)}
.toggle-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

/* SEND ROW */
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--glass);gap:8px;margin-bottom:6px;transition:all .2s}
.srow:hover{border-color:var(--border2)}

/* SCHEDULE */
.schedule-card{border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;background:var(--glass);margin-bottom:12px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadeUp .35s ease both}
.card{animation:fadeUp .35s ease both}
</style>
</head>

<script>
const SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';

let _session=null;
const emailRx=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

const S={
  step:0,leads:[],headers:[],
  colMap:{email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:'',companySize:'',revenue:''},
  sender:{name:'',email:'',title:'',company:'Velorah'},
  emails:[],genProgress:0,activeIdx:0,
  sendStatus:{},trackingStatus:{},messageIds:{},
  dragOver:false,emailAngle:'pain',researchMode:false,

};

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  const pr=line=>{const r=[];let c='',q=false;for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;};
  const headers=pr(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=pr(l);const o={};headers.forEach((h,i)=>o[h]=v[i]||'');return o;});
  return{headers,rows};
}

function autoMap(headers){
  const map={email:'',fullName:'',firstName:'',lastName:'',company:'',title:'',industry:'',companySize:'',revenue:''};
  const v={email:['email','e-mail','mail'],fullName:['full name','fullname','name','contact name'],firstName:['first name','firstname','first'],lastName:['last name','lastname','surname'],company:['company','organization','org','account'],title:['title','job title','position','role'],industry:['industry','sector','vertical'],companySize:['company size','size','employees','headcount'],revenue:['revenue','annual revenue','arr']};
  headers.forEach(h=>{const hl=h.toLowerCase().trim();Object.entries(v).forEach(([k,vs])=>{if(!map[k]&&vs.some(vv=>hl===vv||hl.includes(vv)))map[k]=h;});});
  return map;
}

function getName(lead){return(lead[S.colMap.fullName]||((lead[S.colMap.firstName]||'')+' '+(lead[S.colMap.lastName]||'')).trim()||lead[S.colMap.email]||'Unknown').trim();}

function getSystem(angle,sz,rev){
  const angles={
    pain:'EMAIL ANGLE: PAIN-FOCUSED. Open by naming their most pressing business risk.',
    roi:'EMAIL ANGLE: ROI-FOCUSED. Lead with financial reality — breach costs, downtime, audit savings.',
    risk:'EMAIL ANGLE: RISK-FOCUSED. Open with real consequences — fines, shutdown, stock price erosion.',
    proof:'EMAIL ANGLE: SOCIAL PROOF. Reference how similar companies solved this with Velorah.',
    question:'EMAIL ANGLE: QUESTION-BASED. Open with one sharp, visceral business question.',
    insight:'EMAIL ANGLE: INSIGHT-LED. Open with a surprising, specific industry data point.'
  };
  const sizeCtx=sz?'\n\nCOMPANY SIZE: '+sz+' employees'+(rev?' | Revenue: '+rev:'')+'.\nAdjust all stats, stakes, and language to match this exact scale. Do not apply SMB language to enterprises.':'';
  return`You are an elite B2B sales copywriter. Every email you write lands in the inbox and gets read.

${angles[angle]||angles.pain}

PRODUCT: Velorah — AI-Powered Cold Email & Cybersecurity Risk Assessment Platform
FEATURES: Automated risk scores, 12+ compliance frameworks (SOC 2, HIPAA, GDPR, PCI DSS, ISO 27001, NIST, CCPA, FedRAMP, DORA, PIPEDA), AI remediation roadmaps, 60-70% cost reduction vs manual audits.

FRAMEWORK SELECTION (never default to SOC 2 unless explicitly tech/SaaS):
Healthcare: HIPAA, HITECH | Finance: PCI DSS, SOX, DORA | Gov: FedRAMP, FISMA | Retail: PCI DSS, CCPA | Manufacturing: NIST CSF, IEC 62443 | Legal: ISO 27001, GDPR | SaaS: SOC 2, ISO 27001${sizeCtx}

STRICT RULES:
- Subject: under 50 chars, no spam triggers, outcome or question format
- Body: exactly 3 short paragraphs — hook, value, CTA
- Conversational peer-to-peer tone, NOT corporate
- ONE specific stat or number
- Soft CTA: offer 15-min call or quick question
- Last line: "If this isn't relevant, just reply and I'll remove you."
- Under 170 words total
- NEVER start with "I hope", "My name is", or any preamble

Respond ONLY with valid JSON, no markdown: {"subject":"...","body":"..."}`;
}

async function callAI(lead){
  const name=getName(lead);
  const company=lead[S.colMap.company]||'your company';
  const title=lead[S.colMap.title]||'decision maker';
  const industry=lead[S.colMap.industry]||'technology';
  const sz=lead[S.colMap.companySize]||'';
  const rev=lead[S.colMap.revenue]||'';
  const prompt=getSystem(S.emailAngle,sz,rev)+'\n\nWrite a cold email to:\n- Name: '+name+'\n- Title: '+title+'\n- Company: '+company+'\n- Industry: '+industry+'\n- From: '+S.sender.name+', '+(S.sender.title||'Account Executive')+', '+S.sender.company+'\n\nJSON only: {"subject":"...","body":"..."}';
  const resp=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,company,industry,companySize:sz,revenue:rev,researchMode:S.researchMode})});
  const txt=await resp.text();
  if(!resp.ok){let e='HTTP '+resp.status;try{const d=JSON.parse(txt);e=d.error||e;}catch(ex){}throw new Error(e);}
  const data=JSON.parse(txt);
  let out=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  out=out.replace(/```json|```/g,'').trim();
  const js=out.indexOf('{');const je=out.lastIndexOf('}');
  if(js<0||je<0)throw new Error('Could not parse AI response');
  return JSON.parse(out.substring(js,je+1));
}

async function sendEmail(to,subject,body){

function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  kids.flat().forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

async function runGenerate(){
  for(let i=0;i<S.leads.length;i++){
    try{
      const{subject,body}=await callAI(S.leads[i]);
      S.emails.push({id:i,lead:S.leads[i],subject,body,approved:true,error:false});
    }catch(err){
      const overload=err.message&&(err.message.includes('529')||err.message.includes('overload')||err.message.includes('504'));
      S.emails.push({id:i,lead:S.leads[i],subject:overload?'[Overloaded — Regenerate]':'[Failed — Regenerate]',body:err.message,approved:false,error:true});
    }
    S.genProgress=i+1;draw();
    await new Promise(r=>setTimeout(r,4000));
  }
  S.step=3;S.activeIdx=0;draw();
}

    det.appendChild(h('div',{cls:'fb'},
      h('div',{cls:'flex'},
        h('button',{cls:'btn '+(ae.approved&&!ae.error?'btn-danger':'btn-success'),style:{fontSize:'12px'},onClick:()=>{S.emails[S.activeIdx].approved=!S.emails[S.activeIdx].approved;draw();}},ae.approved&&!ae.error?'Exclude':'Include'),
        h('button',{cls:'btn',style:{fontSize:'12px'},onClick:async function(){
          this.disabled=true;this.textContent='Regenerating...';
          try{const{subject,body}=await callAI(ae.lead);S.emails[S.activeIdx].subject=subject;S.emails[S.activeIdx].body=body;S.emails[S.activeIdx].approved=true;S.emails[S.activeIdx].error=false;}
          catch(e){alert('Failed: '+e.message);}
          draw();
        }},'↺ Regenerate')
      ),
      h('button',{cls:'btn btn-primary',onClick:()=>{S.step=4;draw();}},'Proceed to Send →')
    ));
  }
  panel.appendChild(det);wrap.appendChild(panel);return wrap;
}

// STEP 4: SEND
function p4(){
  const wrap=h('div',null);
  const approved=S.emails.filter(e=>e.approved&&!e.error);
  const sent=Object.values(S.sendStatus).filter(s=>s==='sent').length;
  const failed=Object.values(S.sendStatus).filter(s=>s==='error').length;
  const scheduled=Object.values(S.sendStatus).filter(s=>s==='scheduled').length;
  const sg4=h('div',{cls:'g4',style:{marginBottom:'14px'}});
  [{v:approved.length,l:'Approved',c:'var(--blue)'},{v:sent,l:'Sent',c:'var(--green)'},{v:scheduled,l:'Scheduled',c:'var(--purple)'},{v:failed,l:'Failed',c:'var(--red)'}].forEach(s=>{
    const card=h('div',{cls:'stat-card'});card.innerHTML='<div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div>';sg4.appendChild(card);
  });
  wrap.appendChild(sg4);

  if(S.bulkSending){
    const pct=S.bulkProgress.total>0?Math.round((S.bulkProgress.sent+S.bulkProgress.failed)/S.bulkProgress.total*100):0;
    const card=h('div',{cls:'card',style:{textAlign:'center',padding:'3rem'}});
    card.innerHTML='<div style="font-size:40px;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(59,130,246,.5))">🚀</div><h2 style="font-size:18px;font-weight:800;margin-bottom:6px">Sending campaign...</h2><p style="color:var(--text2);font-size:13px;margin-bottom:20px">'+S.bulkProgress.sent+' sent · '+S.bulkProgress.failed+' failed · '+S.bulkProgress.total+' total</p><div style="max-width:400px;margin:0 auto"><div class="pbar" style="height:6px"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
    wrap.appendChild(card);return wrap;
  }

  const launcher=h('div',{cls:'schedule-card'});
  const nameDiv=h('div',{style:{marginBottom:'14px'}},h('label',{cls:'lbl'},'Campaign Name'));
  const nameInp=document.createElement('input');nameInp.type='text';nameInp.placeholder='e.g. Q2 CISO Outreach — June 2026';nameInp.value=S.campaignName||'';nameInp.addEventListener('input',e=>S.campaignName=e.target.value);
  nameDiv.appendChild(nameInp);launcher.appendChild(nameDiv);

  const schedRow=h('div',{cls:'toggle-row',style:{borderTop:'1px solid var(--border)',paddingTop:'14px'}});
  schedRow.appendChild(h('div',null,h('p',{style:{fontWeight:'700',marginBottom:'2px'}},'⏰ Schedule Delivery'),h('p',{style:{fontSize:'12px',color:'var(--text2)'}},'Send now or schedule up to 72 hours ahead via SendGrid')));
  const togWrap=h('div',{cls:'toggle-wrap'});
  const tog=h('div',{cls:'toggle '+(S.scheduleAt?'on':'off'),onClick:()=>{if(S.scheduleAt){S.scheduleAt=null;}else{const d=new Date();d.setHours(d.getHours()+1);S.scheduleAt=d.toISOString().slice(0,16);}draw();}},h('div',{cls:'toggle-knob'}));
  togWrap.appendChild(tog);togWrap.appendChild(h('span',{cls:'toggle-label',style:{color:S.scheduleAt?'var(--cyan)':'var(--text3)'}},S.scheduleAt?'SCHEDULED':'SEND NOW'));
  schedRow.appendChild(togWrap);launcher.appendChild(schedRow);

  if(S.scheduleAt){
    const dtDiv=h('div',{style:{marginTop:'12px'}},h('label',{cls:'lbl'},'Schedule Date & Time'));
    const dtInp=document.createElement('input');dtInp.type='datetime-local';dtInp.value=S.scheduleAt;
    const min=new Date();min.setMinutes(min.getMinutes()+5);dtInp.min=min.toISOString().slice(0,16);
    dtInp.addEventListener('change',e=>S.scheduleAt=e.target.value);dtDiv.appendChild(dtInp);launcher.appendChild(dtDiv);
  }

  launcher.appendChild(h('div',{cls:'flex',style:{marginTop:'16px'}},
    h('button',{cls:'btn btn-launch',onClick:async()=>{
      if(!approved.length){alert('No approved emails to send.');return;}
      const label=S.scheduleAt?'Schedule '+approved.length+' emails for '+new Date(S.scheduleAt).toLocaleString()+'?':'Send '+approved.length+' emails now?';
      if(!confirm(label))return;
      await launchCampaign(approved);
    }},S.scheduleAt?'⏰ Schedule Campaign ('+approved.length+')':'🚀 Launch Campaign ('+approved.length+')'),
    h('button',{cls:'btn',onClick:doExport},'↓ Export CSV'),
    h('button',{cls:'btn',onClick:()=>checkTracking()},'🔄 Tracking'),
    h('button',{cls:'btn',onClick:()=>{S.step=3;draw();}},'← Edit')
  ));
  wrap.appendChild(launcher);

  if(!approved.length){
    wrap.appendChild(h('div',{cls:'card',style:{textAlign:'center',padding:'2.5rem',marginTop:'12px'}},h('div',{style:{fontSize:'32px',marginBottom:'10px'}},'📭'),h('p',{style:{fontWeight:'700',marginBottom:'8px'}},'No approved emails'),h('button',{cls:'btn btn-primary',style:{marginTop:'12px'},onClick:()=>{S.step=3;draw();}},'← Back to Review')));
    return wrap;
  }

  // Color legend
  const legend=h('div',{cls:'flex',style:{marginBottom:'10px',marginTop:'4px'}});
  [['🟢','Opened','rgba(16,185,129,.2)','var(--green)'],['🔵','Clicked','rgba(59,130,246,.2)','var(--blue)'],['🟡','Delivered','rgba(245,158,11,.15)','var(--gold)'],['🔴','Bounced/Failed','rgba(239,68,68,.15)','var(--red)'],['⚪','Pending','var(--bg3)','var(--text3)']].forEach(([e,l,bg,c])=>{
    legend.appendChild(h('span',{style:{padding:'2px 8px',borderRadius:'6px',background:bg,color:c,fontSize:'11px',fontWeight:'700',border:'1px solid '+c+'33'}},e+' '+l));
  });
  wrap.appendChild(legend);

  approved.forEach(ed=>{
    const id=ed.id;const st=S.sendStatus[id];const tr=S.trackingStatus[id];
    const toEmail=(ed.lead[S.colMap.email]||'').trim();
    const nm=getName(ed.lead).substring(0,28);const co=(ed.lead[S.colMap.company]||'').substring(0,22);
    let bg='var(--glass)';let bc='var(--border)';
    if(tr==='opened'){bg='rgba(16,185,129,.08)';bc='rgba(16,185,129,.3)';}
    else if(tr==='clicked'){bg='rgba(59,130,246,.08)';bc='rgba(59,130,246,.3)';}
    else if(tr==='delivered'||st==='sent'){bg='rgba(245,158,11,.06)';bc='rgba(245,158,11,.2)';}
    else if(tr==='bounced'||st==='error'){bg='rgba(239,68,68,.06)';bc='rgba(239,68,68,.2)';}
    else if(st==='scheduled'){bg='rgba(139,92,246,.06)';bc='rgba(139,92,246,.2)';}
    const row=h('div',{cls:'srow',style:{background:bg,borderColor:bc}});
    row.appendChild(h('div',{style:{flex:'1',minWidth:'0'}},h('p',{style:{fontWeight:'700',fontSize:'13px'}},nm+(co?' · ':'')+co),h('p',{style:{fontSize:'12px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ed.subject)));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--text2)',flexShrink:'0',maxWidth:'160px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},toEmail));
    const badge=h('div',{style:{flexShrink:'0',fontSize:'11px',fontWeight:'700',padding:'3px 8px',borderRadius:'6px'}});
    if(tr==='opened'){badge.style.cssText='background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)';badge.textContent='🟢 Opened';}
    else if(tr==='clicked'){badge.style.cssText='background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)';badge.textContent='🔵 Clicked';}
    else if(tr==='delivered'){badge.style.cssText='background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)';badge.textContent='🟡 Delivered';}
    else if(tr==='bounced'){badge.style.cssText='background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)';badge.textContent='🔴 Bounced';}
    else if(st==='sent'){badge.style.cssText='background:rgba(245,158,11,.1);color:var(--gold)';badge.textContent='🟡 Sent';}
    else if(st==='scheduled'){badge.style.cssText='background:rgba(139,92,246,.15);color:var(--purple)';badge.textContent='⏰ Scheduled';}
    else if(st==='sending'){badge.appendChild(h('span',{cls:'spin'}));}
    else if(st==='error'){badge.style.cssText='background:var(--red-dim);color:var(--red)';badge.textContent='🔴 Failed';}
    else{badge.style.cssText='background:var(--bg3);color:var(--text3)';badge.textContent='⚪ Pending';}
    row.appendChild(badge);wrap.appendChild(row);
  });
  return wrap;
}

async function launchCampaign(approved){
  S.bulkSending=true;S.bulkProgress={total:approved.length,sent:0,failed:0};draw();
  const emails=approved.map(ed=>({id:ed.id,to:(ed.lead[S.colMap.email]||'').trim(),subject:ed.subject,body:ed.body}));
  try{
    const resp=await fetch('/.netlify/functions/send-bulk',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(_session?_session.access_token:'')},body:JSON.stringify({emails,fromEmail:S.sender.email,fromName:S.sender.name,scheduleAt:S.scheduleAt||null,campaignName:S.campaignName||'Campaign'})});
    const data=await resp.json();
    if(data.success){
      S.bulkProgress={total:data.total,sent:data.sent,failed:data.failed};
      approved.forEach(ed=>{S.sendStatus[ed.id]=data.messageIds&&data.messageIds[ed.id]?(S.scheduleAt?'scheduled':'sent'):'error';if(data.messageIds&&data.messageIds[ed.id])S.messageIds[ed.id]=data.messageIds[ed.id];});
      try{await fetch('/.netlify/functions/email_history',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(_session?_session.access_token:'')},body:JSON.stringify({records:approved.map(ed=>({campaignName:S.campaignName||'Campaign',name:getName(ed.lead),email:(ed.lead[S.colMap.email]||'').trim(),company:ed.lead[S.colMap.company]||'',title:ed.lead[S.colMap.title]||'',industry:ed.lead[S.colMap.industry]||'',subject:ed.subject,body:ed.body,status:S.scheduleAt?'scheduled':'sent',messageId:data.messageIds?data.messageIds[ed.id]||null:null,scheduledAt:S.scheduleAt||null}))})});}catch(e){}
      alert(S.scheduleAt?'✅ '+data.sent+' emails scheduled for '+new Date(S.scheduleAt).toLocaleString():'✅ Campaign sent! '+data.sent+' sent · '+data.failed+' failed');
      if(!S.scheduleAt)setTimeout(()=>checkTracking(),30000);
    }else alert('Campaign failed: '+(data.error||'Unknown error'));
  }catch(e){alert('Error: '+e.message);}
  S.bulkSending=false;draw();
}

async function checkTracking(){
  const sent=S.emails.filter(e=>S.sendStatus[e.id]==='sent');if(!sent.length)return;
  try{const resp=await fetch('/.netlify/functions/check-tracking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails:sent.map(e=>({email:e.lead[S.colMap.email],messageId:S.messageIds[e.id]||''}))})});const data=await resp.json();if(data.results){Object.entries(data.results).forEach(([email,status])=>{const em=sent.find(e=>e.lead[S.colMap.email]===email);if(em)S.trackingStatus[em.id]=status;});draw();}}catch(e){}
}

function doExport(){
  const approved=S.emails.filter(e=>e.approved&&!e.error);if(!approved.length){alert('No approved emails to export.');return;}
  const hdrs=['Name','Email','Company','Title','Industry','Subject','Body'];
  const csv=[hdrs,...approved.map(e=>[getName(e.lead),e.lead[S.colMap.email]||'',e.lead[S.colMap.company]||'',e.lead[S.colMap.title]||'',e.lead[S.colMap.industry]||'',e.subject,e.body])].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='emails.csv';a.click();
}

// AUTH
async function initAuth(){
  draw();
  try{
    const{data:{session}}=await sbClient.auth.getSession();
    if(!session){window.location.href='/login.html';return;}
    _session=session;
    document.getElementById('topbar-nav').style.display='flex';
    document.getElementById('topbar-right').style.display='flex';
    document.getElementById('user-email').textContent=session.user.email;
    try{const resp=await fetch('/.netlify/functions/check-plan',{headers:{'Authorization':'Bearer '+session.access_token}});const plan=await resp.json();document.getElementById('plan-chip').textContent=plan.plan.charAt(0).toUpperCase()+plan.plan.slice(1);document.getElementById('usage-text').textContent=plan.used+'/'+(plan.limit===-1?'Unlim':plan.limit);document.getElementById('usage-fill').style.width=(plan.limit===-1?0:Math.min(100,(plan.used/plan.limit)*100))+'%';}catch(e){}
    try{const resp=await fetch('/.netlify/functions/user-keys',{headers:{'Authorization':'Bearer '+session.access_token}});const{keys}=await resp.json();if(keys){S.sender.name=keys.sender_name||'';S.sender.email=keys.sender_email||'';S.sender.title=keys.sender_title||'';S.sender.company=keys.sender_company||'Velorah';_session._sendgridKey=keys.sendgrid_key||'';}}catch(e){}
    draw();
    try{const csv=sessionStorage.getItem('velorah_leads_csv');const count=sessionStorage.getItem('velorah_leads_count');if(csv&&count){sessionStorage.removeItem('velorah_leads_csv');sessionStorage.removeItem('velorah_leads_count');const{headers,rows}=parseCSV(csv);S.headers=headers;S.leads=rows;S.colMap=autoMap(headers);S.step=1;draw();const b=document.createElement('div');b.style.cssText='position:fixed;top:64px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--blue),var(--cyan));color:white;padding:12px 24px;border-radius:10px;font-weight:700;z-index:9999;font-size:14px;box-shadow:0 4px 20px rgba(59,130,246,.5)';b.textContent='✅ '+count+' leads imported!';document.body.appendChild(b);setTimeout(()=>b.remove(),4000);}}catch(e){}
  }catch(e){console.warn('Auth:',e.message);}
}

async function saveUserKeys(){
  if(!_session||!_session.access_token)return;
  try{await fetch('/.netlify/functions/user-keys',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_session.access_token},body:JSON.stringify({sendgrid_key:_session._sendgridKey||'',sender_name:S.sender.name,sender_email:S.sender.email,sender_title:S.sender.title,sender_company:S.sender.company})});}catch(e){}
}

async function signOut(){await sbClient.auth.signOut();window.location.href='/login.html';}
initAuth();
</script>

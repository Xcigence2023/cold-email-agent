<html lang="en">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070c18;--bg2:#0d1526;--bg3:#111e35;--text:#e8f0fe;--text2:#7b91b4;--text3:#4a5f80;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--purple:#8b5cf6;--border:rgba(59,130,246,.15);--border2:rgba(59,130,246,.3);--glass:rgba(255,255,255,.03);--r:10px;--rl:14px}
body{font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(59,130,246,.08),transparent 60%),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(139,92,246,.06),transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(7,12,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 15px rgba(59,130,246,.3)}
.brand-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,#e8f0fe,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:2px;margin-left:10px}
.nav a{font-size:12px;font-weight:500;padding:5px 10px;border-radius:8px;text-decoration:none;color:var(--text2);transition:all .2s}
.nav a:hover{color:var(--text);background:rgba(59,130,246,.08)}
.nav a.active{color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1.5rem}
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:14px;font-weight:700;margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:linear-gradient(var(--blue),var(--cyan));border-radius:2px}
.lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
input,select,textarea{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:rgba(13,21,38,.8);color:var(--text);font-family:'Outfit',sans-serif;transition:all .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;line-height:1.6}
.btn{cursor:pointer;font-size:13px;font-weight:600;padding:9px 18px;border:1px solid var(--border);border-radius:var(--r);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s}
.btn:hover{border-color:var(--border2);background:rgba(59,130,246,.06)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--blue),#2563eb);border-color:var(--blue);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-primary:hover{box-shadow:0 4px 25px rgba(59,130,246,.5);transform:translateY(-1px)}
.btn-launch{background:linear-gradient(135deg,var(--red),var(--gold));border:none;color:#fff;font-size:15px;font-weight:800;padding:14px 32px;border-radius:var(--rl);box-shadow:0 4px 20px rgba(239,68,68,.4);letter-spacing:.02em}
.btn-launch:hover{box-shadow:0 8px 30px rgba(239,68,68,.6);transform:translateY(-2px)}
.btn-yt{background:linear-gradient(135deg,#c4302b,#ff0000);border:none;color:#fff;box-shadow:0 4px 15px rgba(196,48,43,.4)}
.btn-yt:hover{box-shadow:0 4px 25px rgba(255,0,0,.5)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);border-color:var(--green);color:#fff}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
.spin-dark{border-color:var(--border);border-top-color:var(--blue)}
@keyframes sp{to{transform:rotate(360deg)}}
.tip{font-size:12px;color:var(--text2);padding:10px 14px;background:rgba(59,130,246,.06);border-radius:var(--r);border-left:3px solid rgba(59,130,246,.3);line-height:1.6;margin-top:8px}
.warn{font-size:12px;padding:10px 14px;background:rgba(245,158,11,.08);border-radius:var(--r);border-left:3px solid var(--gold);color:var(--gold);line-height:1.5}
.pbar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:8px 0}
.pfill{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--red),var(--gold))}
/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:1.5rem;padding:1rem 1.25rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--rl)}
.si{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text3);white-space:nowrap}
.si.active{color:var(--purple)}
.si.done{color:var(--green)}
.sn{width:24px;height:24px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.si.active .sn{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 10px rgba(239,68,68,.5)}
.si.done .sn{background:var(--green);border-color:var(--green);color:#fff}
.sdiv{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:20px}
/* VIDEO PREVIEW */
.vid-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:var(--r);overflow:hidden;position:relative;border:1px solid var(--border)}
.vid-preview video{width:100%;height:100%;object-fit:cover}
.vid-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,12,24,.7);font-size:40px}
/* IMG PREVIEW */
.img-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);position:relative}
.img-preview img{width:100%;height:100%;object-fit:cover}
/* AVATAR GRID */
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.avatar-card{cursor:pointer;border-radius:var(--r);overflow:hidden;border:2px solid var(--border);transition:all .2s;position:relative}
.avatar-card.selected{border-color:var(--purple);box-shadow:0 0 12px rgba(139,92,246,.4)}
.avatar-card img{width:100%;aspect-ratio:1;object-fit:cover}
.avatar-card p{font-size:10px;text-align:center;padding:4px;color:var(--text2);background:var(--bg3)}
/* PLATFORM BADGES */
.plat-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;margin:3px}
.pb-yt{background:rgba(255,0,0,.1);color:#ff4444;border-color:rgba(255,0,0,.2)}
.pb-yt.active{background:rgba(255,0,0,.2);border-color:rgba(255,0,0,.5)}
.pb-li{background:rgba(0,119,181,.1);color:#0077b5;border-color:rgba(0,119,181,.2)}
.pb-li.active{background:rgba(0,119,181,.2);border-color:rgba(0,119,181,.5)}
.pb-em{background:rgba(59,130,246,.1);color:var(--blue);border-color:var(--border2)}
.pb-em.active{background:rgba(59,130,246,.2);border-color:var(--blue)}
/* LOG */
.log-entry{font-size:12px;padding:6px 10px;border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace}
.log-ok{background:rgba(16,185,129,.08);color:var(--green);border:1px solid rgba(16,185,129,.15)}
.log-err{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.15)}
.log-info{background:rgba(59,130,246,.06);color:var(--text2);border:1px solid var(--border)}
.log-spin{background:rgba(139,92,246,.06);color:var(--purple);border:1px solid rgba(139,92,246,.15)}
</style>
</head>
<body>
<div class="topbar">
  <div class="flex" style="gap:0">
    <div class="brand">
      <div class="brand-logo">V</div>
      <span class="brand-name">Velorah</span>
    </div>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/app.html">Campaigns</a>
      <a href="/campaign-video.html" class="active">Ares</a>
      <a href="/linkedin.html">LinkedIn</a>
      <a href="/find-leads.html">Koios Intel</a>
      <a href="/social-listen.html">Athena One</a>
      <a href="/visitors.html">Argus Watch</a>
      <a href="/call-center.html">Call Center</a>
      <a href="/history.html">History</a>
    </nav>
  </div>
  <div class="flex">
    <span id="user-email" style="font-size:12px;color:var(--text2)"></span>

</div>

<div class="page">
  <!-- Hero -->
  <div class="card" style="background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(245,158,11,.05));border-color:rgba(239,68,68,.25);margin-bottom:1.5rem">
    <div class="fb">
      <div>
        <h1 style="font-size:22px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#ef4444,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Ares</h1>
        <p style="font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em">VIDEO CAMPAIGN ENGINE by Velorah</p>
        <p style="font-size:13px;color:var(--text2)">AI generates personalised videos and images for each lead using 100% free open-source tools — distributes across YouTube, email and social automatically</p>
      </div>
      <div class="flex">
        <span class="badge" style="background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)">BETA</span>
      </div>
    </div>
  </div>

  <!-- Step bar -->
  <div class="steps" id="step-bar"></div>

  <!-- Main content -->
  <div id="root"></div>
</div>

<script>
var SB_URL='https://cncxqqxwhejcyiiwlqgf.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuY3hxcXh3aGVqY3lpaXdscWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjY1MzYsImV4cCI6MjA5Mzk0MjUzNn0.pmvjvN9D2sKAiZkgRtIpGX3QRtV9yIB1FFSHqPeuRSI';
var sbClient=null;
try{
  if(window.supabase&&window.supabase.createClient){
    sbClient=window.supabase.createClient(SB_URL,SB_KEY);
  }else{
    throw new Error('Supabase SDK not loaded');
  }
}catch(e){
  // Don't let a failed SDK load blank the whole page — show a clear message instead.
  document.addEventListener('DOMContentLoaded',function(){
    document.body.innerHTML='<div style="max-width:560px;margin:80px auto;font-family:system-ui,Arial;padding:32px;border:1px solid #ddd;border-radius:12px;text-align:center">'+
      '<h2 style="margin:0 0 12px">Couldn\'t load Ares</h2>'+
      '<p style="color:#555;line-height:1.5">The page failed to load a required library (Supabase). This is usually a temporary network or ad-blocker issue.</p>'+
      '<p style="color:#555;line-height:1.5">Please <a href="" onclick="location.reload();return false;" style="color:#4F46E5;font-weight:600">refresh the page</a>. If it keeps happening, disable any ad-blocker for this site or try a different browser.</p>'+
      '</div>';
  });
}
var _session=null;

var S={
  step:0,
  // Campaign info
  campaignName:'',industry:'',tone:'professional',goal:'',senderName:'',senderEmail:'',
  // Leads
  leads:[],
  // Assets
  generatedImage:null,imageUrl:'',
  videoScript:null,selectedAvatar:'',
  selectedVoice:'en-US-GuyNeural',
  // Video results
  videoId:null,videoUrl:null,youtubeUrl:null,
  // Platforms
  platforms:['email'],
  ytAccessToken:null,
  // Log
  log:[],
  // Per-lead results
  leadResults:[],
  videoMode:'canvas',
  imageStyle:'photorealistic',
  avatarPhotoDataUrl:null,
  avatarPhotoName:null,
  _videoBlob:null
};

// Avatar photos are user-uploaded

var VOICES=[
  {id:'en-US-GuyNeural',label:'Professional Male (US)'},
  {id:'en-US-JennyNeural',label:'Professional Female (US)'},
  {id:'en-GB-RyanNeural',label:'British Male'},
  {id:'en-GB-SoniaNeural',label:'British Female'},
  {id:'en-AU-NatashaNeural',label:'Australian Female'},
];


// -- WORKFLOW INTAKE - accept leads from Koios Intel, Athena One, Argus Watch, LinkedIn --
function checkLeadIntake(){
  var csv = sessionStorage.getItem('velorah_leads_csv');
  var count = sessionStorage.getItem('velorah_leads_count');
  var source = sessionStorage.getItem('velorah_source') || 'direct';
  if(!csv) return;
  sessionStorage.removeItem('velorah_leads_csv');
  sessionStorage.removeItem('velorah_leads_count');
  sessionStorage.removeItem('velorah_source');

  // Parse the CSV
  var lines = csv.split('\n').filter(function(l){return l.trim();});
  if(lines[0] && lines[0].toLowerCase().includes('email')) lines.shift();
  S.leads = lines.map(function(l){
    var p = l.split(',').map(function(v){return v.trim().replace(/^"|"$/g,'');});
    return {name:(p[0]||'')+' '+(p[1]||''), firstName:p[0]||'', lastName:p[1]||'',
            email:p[2]||'', company:p[3]||'', title:p[4]||'', industry:p[5]||S.industry||''};
  }).filter(function(l){return l.email;});

  S._rawLeads = csv;
  S.step = 0;

  // Show intake banner
  var banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:64px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;padding:12px 28px;border-radius:10px;font-weight:700;z-index:9999;font-size:14px;box-shadow:0 4px 20px rgba(239,68,68,.4)';
  var sourceLabel = {koios:'Koios Intel', athena:'Athena One', argus:'Argus Watch', linkedin:'LinkedIn Agent', app:'Campaign Agent'}[source] || source;
  banner.textContent = S.leads.length + ' leads received from ' + sourceLabel + ' - Ares is ready to launch';
  document.body.appendChild(banner);
  setTimeout(function(){banner.remove();}, 5000);
  draw();
}

async function init(){
  if(!sbClient){ return; }  // SDK failed to load; the DOMContentLoaded handler already showed a message
  try{
    var r=await sbClient.auth.getSession();
    if(!r.data.session){window.location.href='/login.html';return;}
    _session=r.data.session;
    document.getElementById('user-email').textContent=r.data.session.user.email;
    S.senderName=r.data.session.user.user_metadata&&r.data.session.user.user_metadata.full_name||'';
    checkLeadIntake();
    S.senderEmail=r.data.session.user.email||'';
  }catch(e){}
  draw();
}

function draw(){
  renderSteps();
  var root=document.getElementById('root');
  root.innerHTML='';
  var steps=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4];
  if(steps[S.step]) root.appendChild(steps[S.step]());
}

function renderSteps(){
  var names=['Configure','Generate Assets','Preview & Edit','Distribute','Results'];
  var bar=document.getElementById('step-bar');bar.innerHTML='';
  names.forEach(function(n,i){
    var cls='si'+(i===S.step?' active':i<S.step?' done':'');
    var si=mk('div',cls);
    var num=mk('div','sn');num.textContent=i<S.step?'OK':String(i+1);
    var lbl=mk('span',null);lbl.textContent=n;
    si.appendChild(num);si.appendChild(lbl);
    if(i<S.step)si.style.cursor='pointer';
    if(i<S.step)si.addEventListener('click',function(){S.step=i;draw();});
    bar.appendChild(si);
    if(i<names.length-1){var div=mk('div','sdiv');bar.appendChild(div);}
  });
}

// STEP 0: CONFIGURE
function renderStep0(){
  var wrap=mk('div',null);

  // Campaign basics
  var bc=mk('div','card');bc.appendChild(mkTitle('Campaign Details'));
  var g1=mk('div','g2');g1.style.marginBottom='12px';
  [
    {k:'campaignName',l:'Campaign Name',p:'e.g. Q3 CISO Outreach'},
    {k:'senderName',l:'Your Name',p:'Alex Rivera'},
    {k:'senderEmail',l:'Your Email',p:'alex@company.com'},
    {k:'industry',l:'Target Industry',p:'e.g. Healthcare, Finance, SaaS'},
  ].forEach(function(f){
    var d=mk('div',null);d.appendChild(mkLbl(f.l));
    var inp=document.createElement('input');inp.type='text';inp.placeholder=f.p;inp.value=S[f.k]||'';
    inp.addEventListener('input',function(e){S[f.k]=e.target.value;});
    d.appendChild(inp);g1.appendChild(d);
  });
  bc.appendChild(g1);

  var g2row=mk('div','g2');g2row.style.marginBottom='12px';
  var toneDiv=mk('div',null);toneDiv.appendChild(mkLbl('Email Tone'));
  var toneSel=document.createElement('select');
  [['professional','Professional'],['friendly','Warm & Friendly'],['urgent','Urgent'],['casual','Casual & Direct']].forEach(function(o){
    var opt=document.createElement('option');opt.value=o[0];opt.textContent=o[1];if(S.tone===o[0])opt.selected=true;toneSel.appendChild(opt);
  });
  toneSel.addEventListener('change',function(e){S.tone=e.target.value;});
  toneDiv.appendChild(toneSel);g2row.appendChild(toneDiv);
  var goalDiv=mk('div',null);goalDiv.appendChild(mkLbl('Campaign Goal'));
  var goalInp=document.createElement('input');goalInp.type='text';goalInp.placeholder='e.g. Book a 15-min discovery call';goalInp.value=S.goal||'';
  goalInp.addEventListener('input',function(e){S.goal=e.target.value;});
  goalDiv.appendChild(goalInp);g2row.appendChild(goalDiv);
  bc.appendChild(g2row);
  wrap.appendChild(bc);

  // Leads input
  var lc=mk('div','card');lc.appendChild(mkTitle('Leads'));
  var lTip=mk('div','tip');lTip.style.marginBottom='12px';
  lTip.textContent='Upload a CSV or paste leads below (one per line: Name, Company, Email, Title, Industry)';
  lc.appendChild(lTip);
  var ta=document.createElement('textarea');ta.placeholder='John Smith, Acme Health, john@acme.com, CISO, Healthcare\nSarah Chen, FinTech Inc, sarah@fintech.com, CTO, Finance';ta.style.minHeight='120px';
  ta.value=S._rawLeads||'';
  ta.addEventListener('input',function(e){S._rawLeads=e.target.value;});
  lc.appendChild(ta);
  var fi=document.createElement('input');fi.type='file';fi.accept='.csv';fi.style.display='none';
  fi.addEventListener('change',function(e){if(e.target.files[0])readCSV(e.target.files[0],ta);});
  var uploadBtn=mk('button','btn btn-sm');uploadBtn.style.marginTop='8px';uploadBtn.textContent='Upload CSV';
  uploadBtn.addEventListener('click',function(){fi.click();});
  lc.appendChild(uploadBtn);lc.appendChild(fi);
  wrap.appendChild(lc);

  // Platforms
  var pc=mk('div','card');pc.appendChild(mkTitle('Distribution Channels'));
  var platRow=mk('div',null);platRow.style.marginBottom='12px';
  var plats=[{k:'email',cls:'pb-em',icon:'Email',label:'Email Campaign'},
             {k:'youtube',cls:'pb-yt',icon:'YT',label:'YouTube (Unlisted)'},
             {k:'linkedin',cls:'pb-li',icon:'in',label:'LinkedIn Video'}];
  plats.forEach(function(p){
    var btn=mk('span','plat-badge '+p.cls+(S.platforms.indexOf(p.k)>=0?' active':''));
    btn.innerHTML='<span style="font-weight:800">'+p.icon+'</span> '+p.label;
    btn.addEventListener('click',function(){
      var idx=S.platforms.indexOf(p.k);
      if(idx>=0)S.platforms.splice(idx,1);else S.platforms.push(p.k);
      btn.classList.toggle('active');
    });
    platRow.appendChild(btn);
  });
  pc.appendChild(platRow);

  // YouTube connect
  var ytDiv=mk('div',null);ytDiv.id='yt-connect';
  var ytTip=mk('div','tip');
  ytTip.innerHTML='<strong style="color:var(--text)">YouTube:</strong> Click "Connect YouTube" to authorise Velorah to upload videos to your channel. Videos are set to <strong>Unlisted</strong> by default (only people with the link can view).';
  ytDiv.appendChild(ytTip);
  var ytBtn=mk('button','btn btn-sm btn-yt');ytBtn.style.marginTop='8px';
  ytBtn.textContent=S.ytAccessToken?'YouTube Connected':'Connect YouTube Channel';
  ytBtn.addEventListener('click',connectYouTube);

// -- CANVAS VIDEO GENERATOR (100% free, browser-native) --------------
// Creates an animated MP4 from image + text using Canvas + MediaRecorder
// -- CANVAS BRAND IMAGE (zero-API fallback when Pollinations is unavailable) --
function generateCanvasBrandImage(){
  var cnv=document.createElement('canvas');cnv.width=1792;cnv.height=1024;
  var ctx=cnv.getContext('2d');
  // Midnight gradient background
  var grad=ctx.createLinearGradient(0,0,1792,1024);
  grad.addColorStop(0,'#0d1526');grad.addColorStop(0.5,'#111e35');grad.addColorStop(1,'#070c18');
  ctx.fillStyle=grad;ctx.fillRect(0,0,1792,1024);
  // Glow accents
  var g1=ctx.createRadialGradient(300,200,0,300,200,600);
  g1.addColorStop(0,'rgba(59,130,246,.25)');g1.addColorStop(1,'rgba(59,130,246,0)');
  ctx.fillStyle=g1;ctx.fillRect(0,0,1792,1024);
  var g2=ctx.createRadialGradient(1500,850,0,1500,850,520);
  g2.addColorStop(0,'rgba(139,92,246,.2)');g2.addColorStop(1,'rgba(139,92,246,0)');
  ctx.fillStyle=g2;ctx.fillRect(0,0,1792,1024);
  // Grid lines
  ctx.strokeStyle='rgba(59,130,246,.08)';ctx.lineWidth=1;
  for(var x=0;x<1792;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,1024);ctx.stroke();}
  for(var y=0;y<1024;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(1792,y);ctx.stroke();}
  // Campaign text
  ctx.textAlign='center';
  ctx.fillStyle='#06b6d4';ctx.font='700 34px Outfit,Arial,sans-serif';
  ctx.fillText((S.industry||'B2B').toUpperCase()+' CAMPAIGN',896,420);
  ctx.fillStyle='#e8f0fe';ctx.font='900 88px Outfit,Arial,sans-serif';
  var goal=(S.goal||S.campaignName||'Personalised Outreach');
  if(goal.length>34) goal=goal.substring(0,32)+'...';
  ctx.fillText(goal,896,540);
  ctx.fillStyle='#7b91b4';ctx.font='400 30px Outfit,Arial,sans-serif';
  ctx.fillText('A personal message for you from '+(S.senderName||'our team'),896,620);
  // Bottom brand strip
  ctx.fillStyle='rgba(59,130,246,.12)';ctx.fillRect(0,944,1792,80);
  ctx.fillStyle='#3b82f6';ctx.font='700 26px Outfit,Arial,sans-serif';
  ctx.fillText('VELORAH',896,996);
  return cnv.toDataURL('image/jpeg',0.92);
}

// -- IMAGE LOAD WITH FALLBACK CHAIN --
function loadImageWithFallback(urls, onSuccess, onAllFailed){
  var queue=urls.slice();
  function tryNext(){
    if(!queue.length){onAllFailed();return;}
    var url=queue.shift();
    if(url==='canvas'){onSuccess(generateCanvasBrandImage(),'canvas');return;}
    var probe=new Image();
    var done=false;
    var timer=setTimeout(function(){if(!done){done=true;tryNext();}},20000);
    probe.onload=function(){if(!done){done=true;clearTimeout(timer);onSuccess(url,'remote');}};
    probe.onerror=function(){if(!done){done=true;clearTimeout(timer);tryNext();}};
    probe.src=url;
  }
  tryNext();
}

function generateCanvasVideo(imageUrl, script, recipientName, audioBase64, audioMime){
  return new Promise(function(resolve, reject){
    var canvas=document.createElement('canvas');
    canvas.width=1280;canvas.height=720;
    var ctx=canvas.getContext('2d');
    var img=new Image();img.crossOrigin='anonymous';

    img.onload=function(){
      // ---- Set up audio (ElevenLabs voiceover) if provided ----
      var audioEl=null, audioCtx=null, audioDuration=0, combinedStream=null;
      var canvasStream=canvas.captureStream(25);

      function startRecording(){
        var tracks=[].concat(canvasStream.getVideoTracks());
        var audioStreamDest=null;
        if(audioEl){
          try{
            audioCtx=new (window.AudioContext||window.webkitAudioContext)();
            var srcNode=audioCtx.createMediaElementSource(audioEl);
            audioStreamDest=audioCtx.createMediaStreamDestination();
            srcNode.connect(audioStreamDest);
            srcNode.connect(audioCtx.destination); // so it's audible while recording too (optional)
            tracks=tracks.concat(audioStreamDest.stream.getAudioTracks());
          }catch(e){ /* if audio routing fails, fall back to silent video */ }
        }
        combinedStream=new MediaStream(tracks);

        var chunks=[];
        var mime='video/webm;codecs=vp9,opus';
        if(!MediaRecorder.isTypeSupported(mime)) mime='video/webm';
        var mr=new MediaRecorder(combinedStream,{mimeType:mime});
        mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
        mr.onstop=function(){
          try{ if(audioCtx) audioCtx.close(); }catch(e){}
          resolve(new Blob(chunks,{type:'video/webm'}));
        };
        mr.start();

        var startTime=Date.now();
        // Duration: match the audio if we have it, else estimate from script length.
        var estMs=Math.min((script||'').split(' ').length/2.5,55)*1000;
        var duration=audioDuration>0?(audioDuration*1000+400):estMs;

        if(audioEl){ try{ audioEl.currentTime=0; audioEl.play(); }catch(e){} }

        var lastChar=Date.now();var charIdx=0;
        var totalChars=(script||'').length;
        function frame(){
          var elapsed=Date.now()-startTime;
          var progress=Math.min(elapsed/duration,1);
          var scale=1+progress*0.08;
          var ox=(canvas.width*(scale-1))/2;
          var oy=(canvas.height*(scale-1))/2;
          ctx.clearRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,-ox,-oy,canvas.width*scale,canvas.height*scale);
          ctx.fillStyle='rgba(7,12,24,0.62)';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.fillStyle='rgba(79,70,229,0.92)';
          ctx.fillRect(0,600,canvas.width,120);
          ctx.fillStyle='#fff';ctx.font='bold 26px Outfit,Arial';ctx.textAlign='left';
          ctx.fillText('Personalised for '+(recipientName||'You'),40,648);
          ctx.font='16px Outfit,Arial';ctx.fillStyle='rgba(255,255,255,.7)';
          ctx.fillText('Velorah Video Campaign',40,676);
          // Reveal script text in sync with overall progress (so it tracks the voiceover).
          var targetChars=Math.floor(totalChars*progress);
          if(charIdx<targetChars){charIdx=targetChars;}
          ctx.fillStyle='#e8f0fe';ctx.font='22px Outfit,Arial';ctx.textAlign='center';
          var visibleScript=(script||'').substring(0,charIdx);
          var visLines=wrapText(ctx,visibleScript,1100,22);
          var startY=200;
          visLines.slice(-8).forEach(function(l,i){ctx.fillText(l,640,startY+i*34);});
          ctx.fillStyle='rgba(79,70,229,.35)';ctx.fillRect(0,710,canvas.width,10);
          ctx.fillStyle='#4F46E5';ctx.fillRect(0,710,canvas.width*progress,10);
          if(elapsed<duration)requestAnimationFrame(frame);else{ try{ if(audioEl) audioEl.pause(); }catch(e){} mr.stop(); }
        }
        requestAnimationFrame(frame);
      }

      if(audioBase64){
        audioEl=document.createElement('audio');
        audioEl.src='data:'+(audioMime||'audio/mpeg')+';base64,'+audioBase64;
        audioEl.crossOrigin='anonymous';
        audioEl.onloadedmetadata=function(){
          audioDuration=isFinite(audioEl.duration)?audioEl.duration:0;
          startRecording();
        };
        audioEl.onerror=function(){ audioEl=null; startRecording(); }; // fall back to silent
        // Safety: if metadata never fires, start anyway after 1.5s
        setTimeout(function(){ if(!combinedStream){ startRecording(); } },1500);
      }else{
        startRecording();
      }
    };
    img.onerror=function(){reject(new Error('Could not load image'));};
    img.src=imageUrl;
  });
}

function wrapText(ctx,text,maxW,fontSize){
  ctx.font=fontSize+'px Outfit,Arial';
  var words=text.split(' ');var lines=[];var cur='';
  words.forEach(function(w){
    var test=cur+(cur?' ':'')+w;
    if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else cur=test;
  });
  if(cur)lines.push(cur);
  return lines;
}

async function blobToBase64(blob){
  return new Promise(function(res){var rd=new FileReader();rd.onload=function(){res(rd.result.split(',')[1]);};rd.readAsDataURL(blob);});
}

  S.leadResults.forEach(function(r){
    var row=mk('div',null);
    row.style.cssText='display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px';
    var left=mk('div',null);
    left.innerHTML='<strong>'+(r.lead.name||'(no name)')+'</strong> <span style="color:var(--text2)">'+(r.lead.company||'')+'</span>';
    var right=mk('span','badge');
    if(r.script){right.style.cssText='background:rgba(16,185,129,.15);color:var(--green)';right.textContent='Script ready';}
    else{right.style.cssText='background:rgba(239,68,68,.15);color:var(--red)';right.textContent='No script';}
    row.appendChild(left);row.appendChild(right);lc.appendChild(row);
  });
  wrap.appendChild(lc);
  var next=mk('button','btn btn-launch');next.textContent='Continue to distribution';
  next.addEventListener('click',function(){S.step=3;draw();});
  wrap.appendChild(next);
  return wrap;
}

// STEP 3: DISTRIBUTE
function renderStep3(){
  var wrap=mk('div',null);
  var dc=mk('div','card');dc.appendChild(mkTitle('Distribute Campaign'));
  var summary=mk('div','tip');
  summary.innerHTML='Sending to <strong>'+S.leadResults.length+'</strong> leads via: <strong>'+
    (S.platforms.length?S.platforms.join(', '):'no channel selected')+'</strong>';
  dc.appendChild(summary);
  if(S._distributing){
    var pb=mk('div','pbar');var pf=mk('div','pfill');
    pf.style.width=(S._distProgress||0)+'%';pb.appendChild(pf);dc.appendChild(pb);
    var st=mk('p',null);st.style.cssText='font-size:12px;color:var(--text2)';
    st.textContent='Distributing... '+(S._distProgress||0)+'%';dc.appendChild(st);
  }else{
    var go=mk('button','btn btn-launch');go.style.marginTop='12px';go.textContent='Send campaign';
    go.addEventListener('click',function(){
      if(!S.platforms.length){alert('Select at least one distribution channel.');return;}
      runDistribution();
    });
    dc.appendChild(go);
  }
  wrap.appendChild(dc);
  var lc=mk('div','card');lc.appendChild(mkTitle('Activity'));
  S.log.slice(-25).forEach(function(entry){
    var le=mk('div','log-entry log-'+entry.type);
    le.textContent=(entry.type==='ok'?'OK  ':entry.type==='err'?'ERR ':entry.type==='spin'?'... ':'    ')+entry.msg;
    lc.appendChild(le);
  });
  wrap.appendChild(lc);
  return wrap;
}

// STEP 4: RESULTS
function renderStep4(){
  var wrap=mk('div',null);
  var sent=S.leadResults.filter(function(r){return r.emailSent;}).length;
  var yt=S.leadResults.filter(function(r){return r.youtubeUrl;}).length;
  var rc=mk('div','card');rc.appendChild(mkTitle('Campaign Results'));
  var grid=mk('div','g3');
  [[S.leadResults.length,'Leads','var(--blue)'],[sent,'Emails sent','var(--green)'],[yt,'YouTube uploads','var(--red)']].forEach(function(s){
    var c=mk('div',null);
    c.style.cssText='text-align:center;padding:14px;border:1px solid var(--border);border-radius:10px';
    c.innerHTML='<div style="font-size:26px;font-weight:800;font-family:IBM Plex Mono,monospace;color:'+s[2]+'">'+s[0]+'</div>'+
      '<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:3px">'+s[1]+'</div>';
    grid.appendChild(c);
  });
  rc.appendChild(grid);wrap.appendChild(rc);
  var lc=mk('div','card');lc.appendChild(mkTitle('Per-lead detail'));
  S.leadResults.forEach(function(r){
    var row=mk('div',null);
    row.style.cssText='display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px';
    var left=mk('div',null);
    left.innerHTML='<strong>'+(r.lead.name||'(no name)')+'</strong> <span style="color:var(--text2)">'+(r.lead.email||'')+'</span>';
    var right=mk('span','badge');
    if(r.emailSent){right.style.cssText='background:rgba(16,185,129,.15);color:var(--green)';right.textContent='Sent';}
    else{right.style.cssText='background:var(--bg3);color:var(--text3)';right.textContent='Not sent';}
    row.appendChild(left);row.appendChild(right);lc.appendChild(row);
  });
  wrap.appendChild(lc);
  var again=mk('button','btn btn-primary');again.textContent='Start another campaign';
  again.addEventListener('click',function(){
    S.step=0;S.log=[];S.leadResults=[];S.videoUrl=null;S._videoBlob=null;S._distProgress=0;draw();
  });
  wrap.appendChild(again);
  return wrap;
}

// DISTRIBUTION
async function runDistribution(){
  S._distributing=true;S._distProgress=0;S.step=3;draw();
  for(var i=0;i<S.leadResults.length;i++){
    var r=S.leadResults[i];
    if(S.platforms.indexOf('youtube')>=0&&S._videoBlob&&S.ytAccessToken&&!r.youtubeUrl){
      addLog('spin','Uploading video to YouTube...');
      try{
        var ytResp=await fetch('/.netlify/functions/video_agent',{
          method:'POST',headers:vaHeaders(),
          body:JSON.stringify({action:'upload-youtube',payload:{videoUrl:S.videoUrl,title:S.campaignName||'Velorah Campaign',description:(r.script&&r.script.script)||'',accessToken:S.ytAccessToken}})
        });
        var ytData=await ytResp.json();
        if(ytData.youtubeUrl){r.youtubeUrl=ytData.youtubeUrl;addLog('ok','YouTube: '+ytData.youtubeUrl);}
        else addLog('err','YouTube: '+(ytData.error||'upload failed'));
      }catch(e){addLog('err','YouTube error: '+e.message);}
    }
    if(S.platforms.indexOf('email')>=0&&r.lead.email){
      addLog('spin','Sending email to '+r.lead.email+'...');
      var subj=(S._emailSubject||'A quick idea for {{company}}')
        .replace('{{name}}',r.lead.name||'')
        .replace('{{company}}',r.lead.company||'')
        .replace('{{industry}}',r.lead.industry||'');
      var emailBody=r.script?r.script.script:'Hi '+r.lead.name+',\n\n'+S.goal;
      if(r.youtubeUrl){emailBody+='\n\nI recorded a short personalised video for you:\n'+r.youtubeUrl;}
      else if(S.imageUrl&&S.imageUrl.indexOf('http')===0){emailBody+='\n\n[View campaign materials: '+S.imageUrl+']';}
      try{
        var eResp=await fetch('/.netlify/functions/send',{method:'POST',headers:{'headers:vaHeaders()'},body:JSON.stringify({to:r.lead.email,subject:subj,body:emailBody,fromEmail:S.senderEmail,fromName:S.senderName})});
        var eData=await eResp.json();
        if(eData.success){r.emailSent=true;addLog('ok','Sent to '+r.lead.email);}
        else addLog('err','Email failed: '+(eData.error||'unknown'));
      }catch(e){addLog('err','Email error: '+e.message);}
    }
    S._distProgress=Math.round(((i+1)/S.leadResults.length)*100);
    draw();
    await delay(1200);
  }
  S._distributing=false;S._distProgress=100;
  addLog('ok','Campaign complete. '+S.leadResults.filter(function(r){return r.emailSent;}).length+' emails sent.');
  S.step=4;draw();
}
async function signOut(){await sbClient.auth.signOut();window.location.href='/login.html';}
init();
</script>
